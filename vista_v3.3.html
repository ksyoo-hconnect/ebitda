<script type="text/babel">
    if (!window.React || !window.ReactDOM) {
        document.getElementById("root").innerHTML = "React or ReactDOM failed to load from CDN.";

    const {useEffect, useMemo, useState} = React;

    function useViewport() {
        const getWidth = () => (typeof window === "undefined" ? 480 : window.innerWidth);
        const [width, setWidth] = useState(getWidth);
        useEffect(() => {
            const onResize = () => setWidth(getWidth());
            window.addEventListener("resize", onResize);
            return () => window.removeEventListener("resize", onResize);
        }, []);
        return width;
    }

    function InlineIcon({children, size = 13, color = "currentColor"}) {
        return (
            <span
                aria-hidden="true"
                style={{
                    display: "inline-flex",
                    alignItems: "center",
                    justifyContent: "center",
                    width: size,
                    height: size,
                    color,
                    fontSize: size,
                    lineHeight: 1,
                    flexShrink: 0,
                }}
            >
              {children}
            </span>
        );
    }

    const Power = (props) => <InlineIcon {...props}>⏻</InlineIcon>;
    const Cpu = (props) => <InlineIcon {...props}>⏻</InlineIcon>;
    const TriangleAlert = (props) => <InlineIcon {...props}>!</InlineIcon>;
    const Link2 = (props) => <InlineIcon {...props}>↔</InlineIcon>;
    const Layers = (props) => <InlineIcon {...props}>≡</InlineIcon>;
    const Building2 = (props) => <InlineIcon {...props}>▦</InlineIcon>;
    const Activity = (props) => <InlineIcon {...props}>⌁</InlineIcon>;
    const HardDrive = (props) => <InlineIcon {...props}>⌁</InlineIcon>;
    const Grid3X3 = (props) => <InlineIcon {...props}>⌁</InlineIcon>;
    const ChevronDown = (props) => <InlineIcon {...props}>⌁</InlineIcon>;
    const AlertTriangle = (props) => <InlineIcon {...props}>⌁</InlineIcon>;

    // (위 설명서 헤더가 여기 위치)
    /* ═══════════════════════════════════════════════════════════════════════
     * 인바이츠 루프 OS · Vista형 외래병원 ΔEBITDA 시뮬레이터 · v2.5
     * 팀 설명서 (헤더판) — 미국 본토 모델(ebitda-engine v3.5)과 레이아웃·용어 동형
     * ═══════════════════════════════════════════════════════════════════════
     *
     * §0 용어집
     * ─────────────────────────────────────────────────────────────────────
     * [경로·구조]
     *   W        Wellness/관문 — 건강검진 단계 (환자 여정의 입구)
     *   M1       외래 진료 단계
     *   M2       입원·퇴원 단계 (외래 모델엔 없음 — 상급병원 연계로만 접촉)
     *   M3       진료 후 지속관리 단계 (만성 관리, recurring)
     *   S1/S2/S3 도입 범위(scope): ①외래만 / ②+검진 / ③+기업위탁
     *   B1/B2/B3 수익 레이어: B1=직접수익(청구 현금) B2=운영효율(원가·인력)
     *            B3=가치·플랫폼(기업 구독) — 미국 모델과 동일 정의
     * [재무·지표]
     *   EBITDA   이자·세금·상각 전 이익 / ΔEBITDA = Loop 도입 개선분(산출물)
     *   ARPU     방문 1회당 평균 매출 (진료+검사+약제)
     *   FFS      Fee-for-Service, 행위별 수가 (건당 과금)
     *   PEPM     Per-Employee-Per-Month, 기업의 직원 1인당 월 구독료
     *   CAC/LTV  고객 획득 비용 / 고객 생애 가치
     *   occGate  가동률 게이트 — 슬롯 여유가 있어야 회복 방문이 매출 (0~1)
     *   cannib   잠식률 — 원격 방문 중 '어차피 올 환자의 대체' 비중 (순증 차감)
     *   κ(카파)  교차 리프트 — 레버 간 행동 시너지 승수. 기본 0, 실측 전제
     *   denial   보험 청구 거절 — 실현율 게이트가 차감하는 손실
     * [케어·청구]
     *   FU            Follow-Up, 예정된 재방문
     *   케어갭        임상적으로 받아야 하는데 안 받은 검사·처치
     *   RCM           Revenue Cycle Mgmt — 시행 케어의 완전 청구·회수 (B1d 레버,
     *                 미국 모델과 동일 용어)
     *   clean-claim   거절 사유 없는 완결 청구 (문서·코드·승인 완비)
     *   GOP           Guarantee of Payment, 보험사 사전 지급보증
     *   charge capture 시행 항목의 청구 누락 방지
     *   EAP           Employee Assistance Program, 기업 임직원 건강지원
     *   RPM           Remote Patient Monitoring, 기기 기반 원격 모니터링

     *                 본 모델 M3 관리료 ≈ APCM, G1 ≈ TCM의 외래판
     *   CPT/ICD       미국식 처치/진단 코드 (Vista 청구가 CPT 참조 운영 [DR])
     * [Loop OS 구성요소]
     *   IRS+     위험 스코어링 엔진 (숨은 만성 발굴·케어갭 탐지)
     *   SiBC/JITAI 행동개입 엔진/적시 개입 (리마인더·아웃리치 자동화)
     *   iCHMS    재무 귀속 엔진 (개입→성과→금액 closed-loop)
     *   span     케어매니저 1인 관리 환자 수 — AI가 확대
     * [데이터 신뢰도]
     *   [DR]     Data Room — 실사 검증 실측 (레퍼런스: Vista 심천 2026.06 1차)
     *   [ASS]    Assumption — 합리적 추정 (근거 = 우리 판단뿐)
     *   [PENDING] 사실관계 미확인 (라이선스·협의·규제)
     * [규제·기관]
     *   NMPA     중국 국가약품감독관리국 (의료기기·SaMD 인허가)
     *   PIPL     중국 개인정보보호법 (국경간 데이터 이전)
     *   互联网医院 인터넷병원 라이선스 — 원격진료 합법 청구의 전제
     *   HGR      인간유전자원 규제 (Non-Genomics 경로로 우회)
     *   PoC/FI/EMR 개념검증 시범계약 / 재무적 투자자 / 전자의무기록
     *
     * §1 목적
     *   Vista형 외래병원(상업보험+기업채널+검진병설)의 실측치를 입력하면 Loop 도입 시
     *   연간 EBITDA 개선을 레버 단위로 추정. 레버 개별 ON/OFF로 단계적 도입·미실행을
     *   즉시 반영 — 레버별 기여·순ΔEBITDA 실시간.
     *   철학: 환자 경로(W→M1→M3)를 따라 ①케어-청구 누수를 구조적으로 제거(기존 수가)
     *   ②측정 가능해진 성과를 새 수가로 상품화(신규 수가). 대외 표현 = \"문서화 완결
     *   청구·측정 가능한 케어\" (extraction 프레임 금지).
     *
     * §2 레버 (22)
     *   [B1 직접수익 — 누수 제로화 8]
     *     B1a 원격케어 순증 (잠식 차감) · B1b 무상케어 청구화(24h핫라인·결과상담)
     *     B1c FU 미방문 회복 (×occGate) · B1d RCM 청구완결(capture+삭감회수)
     *     M1a 케어갭 시행(할 것을 하게 — B1d의 '한 것 청구'와 별개 층)
     *     W3 재검 이행 · W4 유소견→전문의 외래 · G1 상급병원 복귀 케어(≈TCM,
     *     리퍼럴fee 아님 — 리베이트 금지 준수)
     *   [B1 직접수익 — 신규 수가 7]
     *     M3 만성 관리료(≈APCM, recurring 심장) · M3v 신규 lives FU방문(별개 수가)
     *     Rx 약국 refill(의약 미분리 [DR]) · RPM 원격모니터링(파트너십 ON=기기상각 0)
     *     W1 검진 upsell · W5 M3→W 순환검진(루프의 완성) · F1 가족 확산(CAC 0)
     *   [B2 운영효율 2]
     *     B2a 코디 자동화(반복 80% [DR], 전환배치 전제)
     *     B2b AI 케어매니저(span 50→120~200, M3 성장분 증원 회피 — B2a와 풀 분리)
     *   [B3 가치·플랫폼 1]  B3 기업 EAP PEPM (주 레버, TFT 확정 방향)
     *   [분모 확장 3 — lives/명 단위, 매출 아님]
     *     W2 유소견→M3 전환 · C1 기업→검진 유입 · R1 역방향 리드(플라이휠)
     *   [게이트 1]  실현율 게이트(denial) — OFF 시 신규 보험청구에 무대책 거절률
     *     전액 차감. 레버가 아니라 곱셈 계수 (미국 'RCM 레버'와 별개념)
     *
     * §3 승수·의존성
     *   의존성 자동 전파: M3 OFF → M3v·Rx·RPM·W5·W2·F1 무효. scope 미달 강제 OFF.
     *   κ₁(B1a→B1c): 원격 옵션이 미방문 사유 1위 '업무 바쁨' [DR] 해소 → 회복률 리프트
     *   κ₂(RPM→M3계열): 기기 데이터가 이탈·순응 개선 → (Rx+W5) 리프트
     *   κ 기본 0 — Pilot 실측 H₀:κ≤0 검정 전 0 유지 (미국 λ·κ 독트린 승계).
     *   구조적 연결(M3 파생·C1→W2→M3 퍼널)은 수식 명시 — κ와 혼동 금지.
     *
     * §3.5 용어 통일 (미국 v3.5와 동기화)
     *   구 B2a(FU회복)→B1c · 구 B2c(청구완결)→B1d·RCM(동일 개념·동일 용어)
     *   구 RCM 게이트→실현율 게이트(denial) — 동어이의 해소
     *   구 B2b(코디자동화)→B2a · AI→B2b · capGate 표기→occGate
     *   M3 관리료≈APCM · G1≈TCM 외래판 · κ/RPM/W·M 경로는 기존 일치
     *
     * §4 가드레일 11칙 (이중계상·과대 방지)
     *   1 W2·C1·R1은 lives로만  2 원격케어 잠식 차감  3 B1b↔B1a 배타
     *   4 M3v=신규분만(B1c 배타)  5 W4↔W2 동일인 별개 수가  6 밴드 보고(point 금지)
     *   7 M3 OFF→파생 무효  8 실현율 100% 가정 금지  9 B2a↔B2b 인력풀 분리
     *   10 RPM 파트너십 대가는 별도 계약(공짜 아님)  11 구조연결↔κ 구분(κ 기본 0)
     *   12.5 [v2.5] 3×3 매트릭스 도메인: 행=사이트(심천/북경/합산) × 열=범위(①②③).
     *      셀 선택 = 분석 도메인 전환. 사이트 행의 ③열은 비활성 — 기업은 네트워크
     *      자산이라 합산×③에서만 계산(이중계상 방지). 입력은 사이트별 분리 저장.
     *   13 [v2.6] Loop 비용: opex(플랫폼 고정+사이트당+M3 인당)는 ΔEBITDA에서 차감,
     *      capex는 EBITDA 밖 — 회수기간(payback)만. 라이선스료 없음(JV 판권 현물출자,
     *      정산구조 [PENDING]). opex 인건비 = M3 기본 스톡 운영분 — B2b 증원회피와
     *      중복 금지. 게이트 명칭 = 청구성공률(ON 93%/OFF 80% [ASS], 레인지 조절).
     *   14 [v3.1] M3↔B1a 청구 경계: M3 등록 lives 대상 원격접촉은 관리료에 포함 —
     *      B1a(tele) 별도 청구 금지. 모델 산식은 분모가 달라(B1a=방문 볼륨, M3=lives
     *      스톡) 겹치지 않으나, 실무 청구에서 겹칠 수 있음 → Pilot 청구 SOP 필수 조항.
     *      개념 구분: M3=관리한다는 계약(구독) · M3v=진료했다는 행위(FFS) ·
     *      RPM=기기로 지켜본다는 수단(모니터링료) — 3층 병존, 중복 아님 (美 CCM+E/M+RPM 동형).
     *   12 기업 레버(B3·C1·R1) 기본 OFF — 안정화 조건부 [v2.4]. Loop 안정 가동 + Pilot
     *      계수 [DR] 검증 전 위탁 고객 대상 전개 금지. 실패 시 기존 오프라인 위탁 매출
     *      (33개사)이 이탈하는 비대칭 리스크 — upside이기 전에 기존 매출의 인질.
     *      기업 분모는 네트워크 자산 — 사이트별 프리셋에 중복 배정 금지(북경 eap=0),
     *      통합 계산 시 B3·C1은 1회만.
     *
     * §5 사용 절차
     *   ①프리셋(신규 사이트=실사값) ②tier: 기본=제시값·보수=방어선 ③범위 선택
     *   ④실행 계획대로 레버 ON/OFF (예: Pilot=B1a·B1c·B2a·게이트만)
     *   ⑤hero 연간 순ΔEBITDA·밴드 + 4칩 레이어 확인 ⑥보고는 항상 밴드.
     *   온보딩 최소 실사 세트: 연 방문·환자수/페이어 믹스/세그먼트별 ARPU/FU 미방문율
     *   /가동률/만성 비중/검진·패키지 분포/무상 상담량/삭감·거절률/재검 이행률
     *   /위탁기업 수·직원수/고정비·가변비.
     *
     * §6 정직성 규율 · 규제 포지셔닝
     *   ARPU·검진단가·원가 [ASS] 상태 대외 프라이싱 금지 (2차 실사 선행).
     *   B3·C1·R1·F1 = 계약 0건 가설 — 앵커 PoC 1건이 [DR] 조건.
     *   RPM·기기 파트너십 [PENDING: NMPA·Vista협의·PIPL] — 해제 전 확정 금지.
     *   AI는 코디네이션만 대체 — '의료행위 대체' 표현 금지, physician-supervised.
     *   포지셔닝: platform/operator(의료기관 아님) · PHM · 진단/예측 클레임 금지
     *   · 질병확률 환자 직접표시 금지.
     *
     * §8 [v3.0] 5개년 동적 파라미터 — 합의 완료 (2026-07-04)
     *   ① churn(연 이탈) = churn₀(32/25/18%) × (1 − rpmAdopt × δ), δ=0.20/0.35/0.50 [ASS]
     *      — 기기(디지털 구급통·워치)가 이탈의 함수 변수: 물리 앵커·데이터 전환비용·접촉빈도.
     *      Pilot 검증 항목 추가: RPM 사용자 vs 비사용자 이탈률 비교 (δ의 [DR] 경로).
     *   ② 기업 S-커브: Y2 중반 해금 (계수 검증 + 안정가동 6개월 — 가드레일 12 정합)
     *      → 침투 Y2 1.5%(반기) → Y3 8% → Y4 15% → Y5 20%.
     *   ③ 자연 성장: 방문 연 3/5/8% — Loop 귀속과 분리 (자연성장 매출은 ΔEBITDA 미계상).
     *   ④ capacity 한도: 방문 1.6× (가동률 60→95%) — 도달 시 성장 정체 + 3호 사이트 트리거.

        {id: "ops", name: "⑤ 운영효율", sub: "코디 자동화·AI 케어매니저"},
        {id: "ent", name: "⑥ 기업 스포크", sub: "B3·C1·R1 — 합산×③ 전용"},
        {id: "denom", name: "⑦ 분모 확장", sub: "lives만 — 매출 아님 (W2)"},
        {id: "gate", name: "⑧ 청구성공률 게이트", sub: "denial 실현율"},
    ];

    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

    function siteCalc(t, inp, scope, lv, devPartner, kap, corpScreens, entOK, succ, formulas = FORMULA_DEFAULTS, formulaErrors = []) {
        const on = (k) => {
            const d = LEVERS.find((x) => x.k === k);
            if (d.ent && !entOK) return false;
            if (scope < d.sc) return false;
            if (d.dep && !on(d.dep)) return false;
            return lv[k];
        };
        const vc = inp.varCostPct;
        const occ = clamp((0.95 - inp.capUtil) / 0.15, 0, 1);
        const scr = scope >= 2 ? inp.monthlyScreens : 0;
        const cs = on("c1") ? corpScreens : 0;
        const xScr = on("x1") ? (inp.crossPool * t.xConv) / 12 : 0;  // [v3.1] 크로스셀 검진 — 퍼널 합류
        const ts = scr + cs + xScr;
        const revOP = inp.monthlyVisits * inp.arpu;
        const ebitda0 = (revOP + scr * inp.scrPrice) * (1 - vc) - inp.fixedCost;
        const f = (name, vars) => safeEvalFormula(name, formulas, vars, formulaErrors, FORMULA_DEFAULTS[name]);

        let b1 = 0, teleSub = 0;
        if (on("b1")) {
            const teleVisits = inp.monthlyVisits * t.teleAdopt;
            teleSub = teleVisits * t.cannib;
            b1 = f("teleNet", {
                teleVisits,
                cannib: t.cannib,
                teleArpu: t.teleArpu,
                teleSub,
                arpu: inp.arpu,
                vc
            });
        }
        const b1b = on("b1b") ? f("billConvRevenue", {
            monthlyUnbilled: inp.monthlyUnbilled,
            billConv: t.billConv,
            consultFee: inp.consultFee,
            vc
        }) : 0;
        let b2a = 0;
        if (on("b2a")) {
            const scheduledFollowups = (inp.monthlyVisits * inp.fuShare) / (1 - inp.missedRate);
            b2a = f("fuRecoveryRevenue", {
                scheduledFollowups,
                missedRate: inp.missedRate,
                fuRecover: t.fuRecover,
                occ,
                arpu: inp.arpu,
                vc
            });
        }
        const b2c = on("b2c") ? revOP * inp.leakRate * t.capture : 0;
        const m1a = on("m1a") ? inp.monthlyVisits * inp.gapRate * t.gapClose * inp.gapFee * (1 - vc) : 0;
        const w3 = on("w3") ? ts * t.abnRate * 0.5 * t.reExam * (inp.scrPrice * 0.4) * (1 - vc) : 0;
        const w4 = on("w4") ? ts * t.abnRate * t.spConv * (inp.arpu * 1.2) * (1 - vc) : 0;
        const g1 = on("g1") ? inp.monthlyVisits * inp.refOutRate * t.refBack * (inp.arpu * 2) * (1 - vc) : 0;
        const b2b = on("b2b") ? inp.coordN * inp.coordCost * inp.repetitivePct * t.autoReal : 0;
        const w2Lives = on("w2") ? f("w2Lives", {
            screenTotal: ts,
            abnRate: t.abnRate,
            w2Conv: t.w2Conv
        }) : 0;
        const newLives = on("m3") ? t.m3New + w2Lives * 12 : 0;
        const m3Lives = on("m3") ? inp.chronicPanel * t.m3Enroll + newLives : 0;
        const m3 = on("m3") ? f("m3Revenue", {m3Lives, m3Fee: t.m3Fee, vc}) : 0;
        const m3v = on("m3v") ? newLives * (inp.visitsPerLifeYr / 12) * inp.arpu * (1 - vc) : 0;
        const rx = on("rx") ? m3Lives * inp.rxPM * 0.40 : 0;
        const rpmDevCost = devPartner ? 0 : inp.rpmDevAmort;
        const rpm = on("rpm") ? f("rpmRevenue", {
            m3Lives,
            rpmAdopt: t.rpmAdopt,
            rpmFee: inp.rpmFee,
            vc,
            rpmDevCost
        }) : 0;
        const w1 = on("w1") ? scr * inp.scrPrice * t.scrUplift * (1 - vc) : 0;
        const w5 = on("w5") ? (m3Lives * t.scrRepeat / 12) * inp.scrPrice * (1 - vc) : 0;
        const f1 = on("f1") ? (m3Lives * t.famRate / 12) * inp.scrPrice * (1 - vc) : 0;
        const ai = on("ai") ? f("aiSavings", {
            m3Lives,
            spanBase: inp.spanBase,
            aiSpan: t.aiSpan,
            mgrCost: inp.mgrCost
        }) : 0;
        const c1 = on("c1") ? f("corpScreenRevenue", {
            corpScreens: cs,
            scrPrice: inp.scrPrice,
            vc
        }) : 0;
        const x1 = on("x1") ? xScr * inp.scrPrice * (1 - vc) : 0;
        const k1 = on("b1") && on("b2a") ? b2a * kap.k1 : 0;
        const k2 = on("rpm") ? (rx + w5) * kap.k2 : 0;
        const kappa = k1 + k2;
        const insNew = Math.max(b1, 0) + b1b + m1a + w4 + m3v;
        const succRate = on("rcm") ? succ.on : succ.off;      // 청구성공률: ON=clean-claim 가동, OFF=무대책
        const rcm = f("denialCost", {
            insNew,
            insShare: inp.insShare,
            succRate
        });
        const rcmAverted = on("rcm") ? insNew * inp.insShare * (succ.on - succ.off) : 0;
        const parts = {b1, b1b, b2a, b2c, m1a, w3, w4, g1, b2b, ai, m3, m3v, rx, rpm, w1, x1, w5, f1, c1, kappa, rcm};
        const net = Object.values(parts).reduce((a, b) => a + b, 0);
        return {parts, net, ebitda0, m3Lives, w2Lives, rcmAverted, occ};
    }

    function cellCalc(site, scope, t, inpSZ, inpBJ, lv, devPartner, kap, succ, oc, formulas = FORMULA_DEFAULTS) {
        const entOK = site === "comb" && scope >= 3;
        const formulaErrors = [];
        const entBaseActive = lv.b3 || lv.c1 || lv.r1;
        const addedEmp = entOK && lv.r1 ? t.newContracts * ENT.avgEmpPerContract * 0.5 : 0;
        const baseSpokeEmp = entOK && entBaseActive ? oc.spokeN * ENT.spokeEmp : 0;
        const spokeEmpTot = baseSpokeEmp + addedEmp;  // [v3.1] 전환 스포크 기반
        const effEap = spokeEmpTot;
        const c1s = entOK && lv.c1 ? safeEvalFormula("corpScreenFlow", formulas, {
            effectiveEap: effEap,
            corpScrPen: t.corpScrPen
        }, formulaErrors, FORMULA_DEFAULTS.corpScreenFlow) : 0;   // 전환 스포크는 침투 4배 (디지털화 사이트)
        const finish = (r, sitesN, b3v) => {
            // Loop opex 3층: 플랫폼 고정(네트워크) + 사이트당 + M3 인당 [v2.6]
            // 라이선스료 없음 — JV에 루프 판권 현물출자로 대체 (정산구조 [PENDING])
            const opex = safeEvalFormula("loopOpexStatic", formulas, {
                fixed: oc.fixed,
                perSite: oc.perSite,
                perLife: oc.perLife,
                sitesN,
                m3Lives: r.m3Lives
            }, formulaErrors, FORMULA_DEFAULTS.loopOpexStatic);
            const parts = {...r.parts, b3: b3v, opex: -opex};
            const net = r.net + b3v - opex;
            const payback = net > 0 ? oc.capex / net : Infinity;   // capex는 EBITDA 밖 — 회수기간만
            return {...r, parts, net, payback, opex, formulaErrors};
        };
        if (site === "sz" || site === "bj") {
            const r = siteCalc(t, site === "sz" ? inpSZ : inpBJ, scope, lv, devPartner, kap, 0, false, succ, formulas, formulaErrors);
            return {...finish(r, 1, 0), effEap: 0, addedEmp: 0, c1s: 0};
        }
        const shSZ = inpSZ.monthlyVisits / (inpSZ.monthlyVisits + inpBJ.monthlyVisits);
        const a = siteCalc(t, inpSZ, scope, lv, devPartner, kap, c1s * shSZ, entOK, succ, formulas, formulaErrors);
        const b = siteCalc(t, inpBJ, scope, lv, devPartner, kap, c1s * (1 - shSZ), entOK, succ, formulas, formulaErrors);
        const parts = {};
        Object.keys(a.parts).forEach((k) => {
            parts[k] = a.parts[k] + b.parts[k];
        });
        const merged = {
            parts, net: a.net + b.net, ebitda0: a.ebitda0 + b.ebitda0, m3Lives: a.m3Lives + b.m3Lives,
            w2Lives: a.w2Lives + b.w2Lives, rcmAverted: a.rcmAverted + b.rcmAverted, occ: Math.min(a.occ, b.occ)
        };
        const b3v = entOK && lv.b3 ? safeEvalFormula("b3Revenue", formulas, {
            effectiveEap: effEap,
            eapPen: t.eapPen,
            pepm: t.pepm
        }, formulaErrors, FORMULA_DEFAULTS.b3Revenue) : 0;
        return {...finish(merged, 2, b3v), effEap, addedEmp, c1s};
    }

    function dynProject(site, scope, t, inpSZ, inpBJ, lv, devPartner, succ, oc, seq = false, formulas = FORMULA_DEFAULTS) {
        // 5개년 동적 — §8 합의 파라미터. κ=0, 가격 동결, 계수 개선 없음.
        // [v3.1] 스포크 전환 스케줄 (게이트: Y1말 앵커→Y2하 5곳→Y3 대량) — tier별
        const SCHED = t.spokeSched;
        const sites = site === "comb" ? [inpSZ, inpBJ] : [site === "sz" ? inpSZ : inpBJ];
        const entBaseActive = lv.b3 || lv.c1 || lv.r1;
        const errors = [];
        const churnEff = safeEvalFormula("churnEff", formulas, {
            churn0: t.churn0,
            rpmActive: lv.rpm ? 1 : 0,
            m3Active: lv.m3 ? 1 : 0,
            rpmAdopt: t.rpmAdopt,
            delta: t.delta
        }, errors, FORMULA_DEFAULTS.churnEff);
        const years = [];
        let stocks = sites.map((inp) => (lv.m3 ? inp.chronicPanel * t.m3Enroll : 0));
        let capHitYear = null;
        for (let y = 1; y <= 5; y++) {
            // [v3.3] 순차확장 모드: Y1=①외래 Y2=②+검진 Y3~5=③+기업(스포크 Y3=앵커 진입)
            const yScope = seq ? (y === 1 ? 1 : y === 2 ? 2 : 3) : scope;
            const entOK = site === "comb" && yScope >= 3;
            const gf = Math.pow(1 + t.natGrow, y - 1);
            const spokeIdx = seq ? y - 3 : y - 1;              // 순차모드: Y3=스케줄[0](앵커)
            const scheduleValue = entOK && entBaseActive ? SCHED[Math.max(0, Math.min(spokeIdx, SCHED.length - 1))] : 0;
            const spokes = safeEvalFormula("dynSpokes", formulas, {
                entActive: entBaseActive ? 1 : 0,
                scheduleValue
            }, errors, FORMULA_DEFAULTS.dynSpokes);
            const prevSpokeIdx = spokeIdx - 1;
            const prevSpokes = entOK && entBaseActive && y > (seq ? 3 : 1) ? SCHED[Math.max(0, Math.min(prevSpokeIdx, SCHED.length - 1))] : 0;
            const reverseLeadEmp = entOK && lv.r1 ? y * t.newContracts * ENT.avgEmpPerContract * 0.5 : 0;
            const cumSpokeEmp = spokes * ENT.spokeEmp + reverseLeadEmp;
            const c1s = entOK && lv.c1 ? safeEvalFormula("corpScreenFlow", formulas, {
                effectiveEap: cumSpokeEmp,
                corpScrPen: t.corpScrPen
            }, errors, FORMULA_DEFAULTS.corpScreenFlow) : 0;
            const totV0 = sites.reduce((a, i) => a + i.monthlyVisits, 0);
            let net = 0, m3Tot = 0, capHit = false, visTot = 0, capTot = 0;
            sites.forEach((inp, si) => {
                const vc = inp.varCostPct;
                const capMax = inp.monthlyVisits * 1.6;              // §8-④
                const visits = Math.min(inp.monthlyVisits * gf, capMax);
                if (inp.monthlyVisits * gf >= capMax) capHit = true;
                visTot += visits;
                capTot += capMax;
                const scr = yScope >= 2 ? inp.monthlyScreens * Math.pow(1.03, y - 1) : 0;
                const cs = c1s * (inp.monthlyVisits / totV0);
                const ts = scr + cs;
                const occ = Math.max(0, Math.min(1, (0.95 - inp.capUtil * gf) / 0.15)); // 가동률도 성장따라
                // 유입 → 저수지
                const xScr = lv.x1 && yScope >= 2 ? (inp.crossPool * t.xConv) / 12 : 0;
                const ts2 = ts + xScr;
                const w2L = lv.w2 && lv.m3 && yScope >= 2 ? safeEvalFormula("w2Lives", formulas, {
                    screenTotal: ts2,
                    abnRate: t.abnRate,
                    w2Conv: t.w2Conv
                }, errors, FORMULA_DEFAULTS.w2Lives) : 0;
                // 스포크 전환 코호트: 신규 전환 스포크의 위험군 등록 (사이트 방문비중 배분)
                const visitShare = inp.monthlyVisits / totV0;
                const spokeCohort = lv.m3 && entOK ? safeEvalFormula("dynSpokeCohort", formulas, {
                    m3Active: lv.m3 ? 1 : 0,
                    entOKActive: entOK ? 1 : 0,
                    spokes,
                    prevSpokes,
                    spokeEmp: ENT.spokeEmp,
                    spokeEnroll: t.spokeEnroll,
                    visitShare
                }, errors, FORMULA_DEFAULTS.dynSpokeCohort) : 0;
                const inflow = lv.m3 ? (t.m3New + w2L * 12 + spokeCohort * 12) : 0;
                stocks[si] = stocks[si] * (1 - churnEff) + inflow;
                const m3L = stocks[si];
                m3Tot += m3L;
                // 레버 (v2.6 동일 수식 — Loop 귀속분만, 자연성장 매출 미계상 §8-③)
                const teleVisits = lv.b1 ? visits * t.teleAdopt : 0;
                const teleSub = teleVisits * t.cannib;
                const b1 = lv.b1 ? safeEvalFormula("teleNet", formulas, {
                    teleVisits,
                    cannib: t.cannib,
                    teleArpu: t.teleArpu,
                    teleSub,
                    arpu: inp.arpu,
                    vc
                }, errors, FORMULA_DEFAULTS.teleNet) : 0;
                const b1b = lv.b1b ? safeEvalFormula("billConvRevenue", formulas, {
                    monthlyUnbilled: inp.monthlyUnbilled,
                    billConv: t.billConv,
                    consultFee: inp.consultFee,
                    vc
                }, errors, FORMULA_DEFAULTS.billConvRevenue) : 0;
                const scheduledFollowups = (visits * inp.fuShare) / (1 - inp.missedRate);
                const b1c = lv.b2a ? safeEvalFormula("fuRecoveryRevenue", formulas, {
                    scheduledFollowups,
                    missedRate: inp.missedRate,
                    fuRecover: t.fuRecover,
                    occ,
                    arpu: inp.arpu,
                    vc
                }, errors, FORMULA_DEFAULTS.fuRecoveryRevenue) : 0;
                const b1d = lv.b2c ? visits * inp.arpu * inp.leakRate * t.capture : 0;
                const m1a = lv.m1a ? visits * inp.gapRate * t.gapClose * inp.gapFee * (1 - vc) : 0;
                const g1 = lv.g1 ? visits * inp.refOutRate * t.refBack * (inp.arpu * 2) * (1 - vc) : 0;
                const w3 = lv.w3 && yScope >= 2 ? ts2 * t.abnRate * 0.5 * t.reExam * (inp.scrPrice * 0.4) * (1 - vc) : 0;
                const w4 = lv.w4 && yScope >= 2 ? ts2 * t.abnRate * t.spConv * (inp.arpu * 1.2) * (1 - vc) : 0;
                const x1 = lv.x1 && yScope >= 2 ? xScr * inp.scrPrice * (1 - vc) : 0;
                const b2a_ = lv.b2b ? inp.coordN * inp.coordCost * inp.repetitivePct * t.autoReal : 0;
                const ai = lv.ai && lv.m3 ? safeEvalFormula("aiSavings", formulas, {
                    m3Lives: m3L,
                    spanBase: inp.spanBase,
                    aiSpan: t.aiSpan,
                    mgrCost: inp.mgrCost
                }, errors, FORMULA_DEFAULTS.aiSavings) : 0;
                const m3 = lv.m3 ? safeEvalFormula("m3Revenue", formulas, {
                    m3Lives: m3L,
                    m3Fee: t.m3Fee,
                    vc
                }, errors, FORMULA_DEFAULTS.m3Revenue) : 0;
                const m3v = lv.m3v && lv.m3 ? inflow * (inp.visitsPerLifeYr / 12) * inp.arpu * (1 - vc) : 0;
                const rx = lv.rx && lv.m3 ? m3L * inp.rxPM * 0.40 : 0;
                const rpmDevCost = devPartner ? 0 : inp.rpmDevAmort;
                const rpm = lv.rpm && lv.m3 ? safeEvalFormula("rpmRevenue", formulas, {
                    m3Lives: m3L,
                    rpmAdopt: t.rpmAdopt,
                    rpmFee: inp.rpmFee,
                    vc,
                    rpmDevCost
                }, errors, FORMULA_DEFAULTS.rpmRevenue) : 0;
                const w1 = lv.w1 && yScope >= 2 ? scr * inp.scrPrice * t.scrUplift * (1 - vc) : 0;
                const w5 = lv.w5 && lv.m3 && yScope >= 2 ? (m3L * t.scrRepeat / 12) * inp.scrPrice * (1 - vc) : 0;
                const f1 = lv.f1 && lv.m3 && yScope >= 2 ? (m3L * t.famRate / 12) * inp.scrPrice * (1 - vc) : 0;
                const c1 = lv.c1 && yScope >= 3 ? safeEvalFormula("corpScreenRevenue", formulas, {
                    corpScreens: cs,
                    scrPrice: inp.scrPrice,
                    vc
                }, errors, FORMULA_DEFAULTS.corpScreenRevenue) : 0;
                const insNew = Math.max(b1, 0) + b1b + m1a + w4 + m3v;
                const rcm = safeEvalFormula("denialCost", formulas, {
                    insNew,
                    insShare: inp.insShare,
                    succRate: lv.rcm ? succ.on : succ.off
                }, errors, FORMULA_DEFAULTS.denialCost);
                net += b1 + b1b + b1c + b1d + m1a + g1 + w3 + w4 + b2a_ + ai + m3 + m3v + rx + rpm + w1 + x1 + w5 + f1 + c1 + rcm;
            });
            const b3 = entOK && lv.b3 ? safeEvalFormula("b3Revenue", formulas, {
                effectiveEap: cumSpokeEmp,
                eapPen: t.eapPen,
                pepm: t.pepm
            }, errors, FORMULA_DEFAULTS.b3Revenue) : 0;
            const opex = safeEvalFormula("dynLoopOpex", formulas, {
                fixed: oc.fixed,
                perSite: oc.perSite,
                perLife: oc.perLife,
                year: y,
                sitesN: sites.length,
                m3Lives: m3Tot
            }, errors, FORMULA_DEFAULTS.dynLoopOpex); // §8-⑦
            net += b3 - opex;
            if (capHit && !capHitYear) capHitYear = y;
            years.push({y, net, m3: m3Tot, spokes, capHit, util: visTot / capTot * 0.95});
        }
        const cum = years.reduce((a, r) => a + r.net * 12, 0);
        return {years, cum, capHitYear, churnEff, errors};
    }

    const GRP_META = {
        B1: {name: "B1 직접수익", tag: "청구 현금 (누수+신규)", color: "#8BC97E"},
        B2: {name: "B2 운영효율", tag: "원가·인력", color: "#4FC3D9"},
        B3: {name: "B3 가치·플랫폼", tag: "기업 구독 PEPM", color: "#9B8BE8"},
        게이트: {name: "게이트·비용(−)", tag: "청구실패 + Loop opex", color: "#E06C75"},
    };

    const FORMULA_DEFAULTS = {
        teleNet: "teleVisits * (1 - cannib) * teleArpu * (1 - vc) - teleSub * (arpu - teleArpu) * (1 - vc)",
        billConvRevenue: "monthlyUnbilled * billConv * consultFee * (1 - vc)",
        fuRecoveryRevenue: "scheduledFollowups * missedRate * fuRecover * occ * arpu * (1 - vc)",
        w2Lives: "screenTotal * abnRate * w2Conv",
        m3Revenue: "m3Lives * m3Fee * (1 - vc)",
        rpmRevenue: "m3Lives * rpmAdopt * (rpmFee * (1 - vc) - rpmDevCost)",
        aiSavings: "max(0, m3Lives / spanBase - m3Lives / aiSpan) * mgrCost",
        corpScreenFlow: "effectiveEap * corpScrPen * 4 / 12",
        corpScreenRevenue: "corpScreens * scrPrice * (1 - vc)",
        b3Revenue: "effectiveEap * eapPen * pepm",
        denialCost: "-insNew * insShare * (1 - succRate)",
        loopOpexStatic: "fixed + perSite * sitesN + perLife * m3Lives",
        churnEff: "churn0 * (1 - rpmActive * m3Active * rpmAdopt * delta)",
        dynSpokes: "entActive * scheduleValue",
        dynSpokeCohort: "m3Active * entOKActive * max(0, spokes - prevSpokes) * spokeEmp * 0.15 * spokeEnroll / 12 * visitShare",
        dynLoopOpex: "fixed * pow(1.03, year - 1) + perSite * sitesN + perLife * m3Lives",
    };

    const FORMULA_META = [
        {key: "teleNet", label: "원격케어 순증", group: "현재값"},
        {key: "billConvRevenue", label: "무상케어 청구화", group: "현재값"},
        {key: "fuRecoveryRevenue", label: "FU 미방문 회복", group: "현재값"},
        {key: "w2Lives", label: "W2→M3 전환 lives", group: "현재값"},
        {key: "m3Revenue", label: "M3 관리료", group: "현재값"},

    function formulaVarSummary(key, formulas) {
        const expr = String((formulas && formulas[key]) || FORMULA_DEFAULTS[key] || "");
        const fnNames = new Set(["abs", "ceil", "floor", "max", "min", "pow", "round"]);
        const vars = Array.from(new Set((expr.match(/[A-Za-z_][A-Za-z0-9_]*/g) || [])
            .filter((name) => !fnNames.has(name) && Number.isNaN(Number(name)))));
        if (!vars.length) return "상수만 사용합니다.";
        return vars.map((name) => `${name}: ${FORMULA_VAR_HELP[name] || "Vista 내부 변수"}`).join(" · ");
    }

    function safeEvalFormula(name, formulas, vars, errors, fallbackExpr) {
        const hasCustom = !!(formulas && Object.prototype.hasOwnProperty.call(formulas, name));
        const rawExpr = hasCustom ? formulas[name] : (fallbackExpr || FORMULA_DEFAULTS[name] || "");
        const expr = String(rawExpr == null ? "" : rawExpr).trim();
        const fallback = fallbackExpr && fallbackExpr !== expr
            ? safeEvalFormula(`${name}:fallback`, FORMULA_DEFAULTS, vars, errors, fallbackExpr)
            : 0;
        const bad = !expr ||
            /(?:window|document|globalThis|Function|constructor|prototype|=>|;|\[|\]|\{|\}|=|`|'|")/i.test(expr) ||
            !/^[0-9A-Za-z_+\-*/%().,\s]+$/.test(expr) ||
            /[A-Za-z_][A-Za-z0-9_]*\s*\./.test(expr) ||
            /\.\s*[A-Za-z_]/.test(expr);
        if (bad) {
            if (!name.endsWith(":fallback")) errors.push(`${name}: 허용되지 않는 수식`);
            return fallback;
        }
        try {
            const scope = {
                ...vars,
                min: Math.min,
                max: Math.max,
                abs: Math.abs,
                round: Math.round,
                floor: Math.floor,
                ceil: Math.ceil,
                pow: Math.pow,
            };
            const keys = Object.keys(scope);
            const values = keys.map((k) => scope[k]);
            const fn = new Function(...keys, `"use strict"; return (${expr});`);
            const value = Number(fn(...values));
            if (!Number.isFinite(value)) throw new Error("not finite");
            return value;
        } catch (e) {
            if (!name.endsWith(":fallback")) errors.push(`${name}: 계산 실패, 기본식 사용`);
            return fallback;
        }
    }

                                    {formulaErrorList.length ? `오류 ${formulaErrorList.length}건` : "모든 계산식 정상"}
                                </div>
                            </div>
                            <div style={S.formulaNote}>Vista v3.3의 기존 계산식을 그대로 노출한 편집 패널입니다. 수식 오류가 나면 해당 항목만 기본식으로 fallback 됩니다.</div>
                            <div style={S.formulaGrid}>
                                {Array.from(new Set(FORMULA_META.map((item) => item.group))).map((group) => (
                                    <React.Fragment key={group}>
                                        <div style={S.formulaGroup}>{group}</div>
                                        {FORMULA_META.filter((item) => item.group === group).map((item) => (
                                            <div key={item.key} style={S.formulaCell}>
                                                <div style={S.formulaCellHead}>
                                                    <div style={S.inputLabel}>{item.label}</div>
                                                    <button
                                                        style={S.formulaMiniBtn}
                                                        onClick={() => setFormulas((prev) => ({...prev, [item.key]: FORMULA_DEFAULTS[item.key]}))}
                                                    >
                                                        기본식
                                                    </button>
                                                </div>
                                                <div style={S.formulaHelp}>
                                                    <div><span style={S.formulaHelpLabel}>의미</span>{(FORMULA_HELP[item.key] || [])[0] || "Vista 핵심 계산식"}</div>
                                                    <div><span style={S.formulaHelpLabel}>변수</span>{formulaVarSummary(item.key, formulas)}</div>
                                                    <div><span style={S.formulaHelpLabel}>반영</span>{(FORMULA_HELP[item.key] || [])[1] || "대시보드 전반에 반영"}</div>
                                                </div>
                                                <textarea
                                                    spellCheck={false}
                                                    style={S.formulaTextarea}
                                                    value={formulas[item.key]}
                                                    onChange={(e) => setFormulas((prev) => ({...prev, [item.key]: e.target.value}))}
                                                />
                                            </div>
                                        ))}
                                    </React.Fragment>
                                ))}
                            </div>
                        </>
                    )}
                </div>

                <div style={{...S.warnBox, ...S.fullSpan}}>
                    {formulaErrorList.length > 0 && (
                        <div style={S.warn}><TriangleAlert size={12} style={{flexShrink: 0, marginTop: 1}}/>
                            <span>계산식 오류 {formulaErrorList.length}건 — 해당 항목은 Vista 기본식으로 계산했습니다: {formulaErrorList.slice(0, 3).join(" / ")}{formulaErrorList.length > 3 ? " ..." : ""}</span></div>
                    )}
                    <div style={S.warn}><TriangleAlert size={12} style={{flexShrink: 0, marginTop: 1}}/>
                        <span>북경 열 전부 [ASS] — 실사 확인 전 별표. ARPU·원가 [ASS] — 대외 프라이싱 금지. 보고는 밴드로만.</span></div>
                    <div style={S.warn}><TriangleAlert size={12} style={{flexShrink: 0, marginTop: 1}}/>
                        <span>기업 레버(B3·C1·R1) = 안정화 조건부 (가드레일 12) — 실패 시 기존 위탁 33개사 이탈 리스크. Pilot 계수 [DR] 검증 후 해금.</span></div>
                    <div style={S.warn}><TriangleAlert size={12} style={{flexShrink: 0, marginTop: 1}}/>
                        <span>확장 경로 = 매트릭스 대각선: 심천① Pilot(계수 검증) → 합산②(코어) → 검증 후 합산③.</span></div>
                </div>

                <div style={{...S.footer, ...S.fullSpan}}>
                    v3.3 — §11 JV 구조를 실제 term sheet로 교체(대칭 이중 라이선싱, 로열티10%) · 5개년 동적 프로젝션에 순차확장 모드 추가(Y1외래→Y2검진→Y3기업, 합산 도메인 전용) · Vista 핵심 계산식 수동 편집 패널 및 오류 fallback 추가.
                </div>
            </div>
        );
    }
