        }

        const {useEffect, useMemo, useState} = React;

        function useViewport() {
          const getWidth = () => (typeof window === "undefined" ? 480 : window.innerWidth);
          const [width, setWidth] = useState(getWidth);
          useEffect(() => {
            const onResize = () => setWidth(getWidth());
            window.addEventListener("resize", onResize);
            return () => window.removeEventListener("resize", onResize);
          }, []);
          return width;
        }

                color,

                flexShrink: 0,
              }}
            >
              {children}
            </span>
          );

        const Power = (props) => <InlineIcon {...props}>⏻</InlineIcon>;
        const TriangleAlert = (props) => <InlineIcon {...props}>!</InlineIcon>;
        const Link2 = (props) => <InlineIcon {...props}>↔</InlineIcon>;
        const Layers = (props) => <InlineIcon {...props}>≡</InlineIcon>;

        // (위 설명서 헤더가 여기 위치)
    /* ============================================================================
     * 루프 적용 EBITDA 개선 추정모델 — 팀 설명서 (v3.8)
     * ============================================================================
     * 이 헤더는 코드와 함께 버전관리되는 정식 문서입니다. 모델 수정 시 이 헤더도
     * 함께 갱신하십시오. 버전 번호는 파일명·kicker·이 헤더·footer 4곳을 일치시킬 것.
     *
     * ── 0. 이 문서의 사용법 ──────────────────────────────────────────────────
     * 처음 보는 팀원: §1~2(30초·철학)만 읽어도 무엇인지 안다.
     * 숫자를 만지는 사람: §5~9. 코드를 고치는 사람: §10~12.
     * §3(가드레일)은 전원 필독 — 여기를 어기면 모델이 조용히 틀린다.
     *
     * ── 1. 30초 요약 ────────────────────────────────────────────────────────
     * 인수 대상 병원 수치를 넣으면, 인바이츠루프 도입 시 연간 EBITDA 개선폭을
     * 추정한다. 8개 레버 ON/OFF(단계적 도입·미실행 반영), 레버 기여·순ΔEBITDA·
     * 회수기간이 실시간. 핵심 명제: "레버가 만든 돈 ≠ 병원이 가져가는 돈."
     * 지불구조에 따라 만든 돈이 CMS로 새므로, "얼마 만들었나"와 "얼마 회수하나"를
     * 반드시 분리한다.
     *
     * ── 2. 두 축의 철학 ─────────────────────────────────────────────────────
     * 축1 — 무엇이 돈을 만드나 → 3개 레이어(B1/B2/B3)
     * 축2 — 누가 그 돈을 회수하나 → 게이트(Capture)
     * 한 줄: ΔEBITDA = B1(payer mix 게이팅) + B2(payer-eligible)×(1+λ×κ) + B3(TM/MA only) − opex
     *        (capex는 EBITDA 밖, 회수기간에만.)
     *
     * ── 3. 가드레일 — 전원 필독 (이중계상 방지) ─────────────────────────────
     * (1) 게이트는 한 곳에. "누가 회수하나"는 전부 Capture에서. m·θ·%TM을 여러 군데
     *     흩뿌리면 같은 달러를 두 번 깎거나 더한다.
     * (2) λ는 B2(원가)에만. 원가 레버 간 상호작용(초가법성)만. 매출·가치층 금지.
     * (3) θ는 B3의 TM shared savings에만. DRG 고정 원가(LOS)는 100% 회수라 θ 불필요.
     * (4) 케어 인건비는 한 번만. 원격케어 margin에 이미 반영 → opex 환자당은 플랫폼 몫만.
     * (5) journey 이중계상 방지: M1 외래/triage 수익 ↔ RCM(Part A DRG)은 별개 stream.
     *     M3(APCM/RPM)와 W(AWV/스크리닝)는 월반복·연1회 관문으로 중복 청구하지 않는다.
     * ★ 새 레버 추가 시 반드시 이 다섯에 비춰 검토.
     *
     * ── 4. 3개 레이어 ───────────────────────────────────────────────────────
     * B1 직접수익  | 청구 현금        | 원격케어(경로)·RCM·Self-Pay전환 | payer 게이팅   | 확실성 높음
     * B2 운영효율  | 원가·throughput | Self-Pay원가·LOS·HRR·Agency    | LOS/HRR ×(1+λ×κ) | 중간
     * B3 가치기반  | 시스템 절감      | VBC(TM shared / MA HCC)        | selBias×θ·regime / selBias×maVbc | 지불구조 종속
     *
     * ── 5. B1 Patient Journey Engine (v3.8) ───────────────────────────────
     * v3.8부터 W/M1/M2/M3 자체를 인바이츠 루프 patient journey에 정합시킨다.
     *   M1 외래 진입·triage = 내원/접수/진료 + IRS+ 생성 + 앱 activation
     *   M2 입원·처치·회복   = 입원/수술/처치/병상 회복 + 퇴원 전이 준비
     *   M3 퇴원후 회복·Loop = 통원·원격케어·APCM/RPM 월 반복 관리
     *   W  wellness 복귀    = 회복 후 AWV·스크리닝·재발방지·APCM 재진입 관문
     * 계산식도 journey 의미에 맞춘다:
     *   M1 외래/triage  = 외래 panel × M1포착률 × $400 × margin
     *   M2 acute care   = 퇴원수 × TCM적격률 × $230 × margin
     *   M3 Loop care    = 등록panel(panel×π) × netPMPM × 12
     *   W  wellness     = panel × AWV포착률 × $150 × margin
     * 합계에 payer 스플릿(TM×1 / MA×m / Medicaid×mk / Commercial×0) + ACO 음결합 차감.
     * M3 코호트 스택: 만성(APCM L2+RPM)·QMB복합(L3+RPM+BHI)·행동건강(+CoCM)·경증(L1).
     * 가중 gross ~$181/월 × margin × adherence. 배타규칙(APCM↔CCM·PCM·TCM)이라 18코드 합 아님.
     *
     * ── 6. B2 원가 — LOS haircut ────────────────────────────────────────────
     * ΔLOS × 1일당변동비 × (퇴원수 × 대상비중) × realizable haircut + throughput.
     *   대상비중: pathway 최적화 가능 퇴원 서브셋(전체 아님).
     *   realizable haircut: 진짜 원가에서 빠지는 몫만(0.4일 단축이 곧 FTE절감 아님 — step-fixed 착시).
     *   throughput: 빈 병상→신규환자, 점유율 게이팅(55%↓ 거의 0, 85%+ 완전 실현).
     *
     * ── 7. B3 VBC — CMS AHCAH 실측 앵커 ─────────────────────────────────────
     *   TM shared savings = 퇴원수 × %TM × ACO귀속 × CMS 절감/에피소드 × selBias × θ × regime배수
     *   MA HCC·품질       = MA lives × HCC값 × maVbc × selBias  (선택편의 보수 반영)
     * CMS AHCAH 30일 절감 밴드: 보수 $1,088(top-10 볼륨가중에 선택편의 보수 반영),
     *   기본 $1,209(볼륨가중 raw), 공격 $1,640(CMS Overall, 25 DRG).
     * selBias 기본 0.90은 HCC gap(2.04/2.26≈0.90)을 이용한 순귀속 근사. TM shared
     *   savings와 MA HCC·품질 업사이드에 모두 적용하되, 정식 위험보정 point estimate가
     *   아니라 밴드 조정계수다.
     * IC 방어: B3는 payer 절감 풀이지 병원 EBITDA가 아니다. 반드시 θ·regime을 통과해야 한다.
     * IC 방어: LOS 레버를 AHCAH 데이터로 정당화하지 말 것. AHCAH LOS는 오히려 +0.79일.
     *
     * ── 8. λ·θ·regime — 오해 방지 ──────────────────────────────────────────
     * λ(원가 시너지): 원가 레버 함께 켜면 각자 합보다 더 나오는 부분. 2개↑ ON에서만
     *   작동하되, 원격케어가 켜진 LOS/HRR cross-efficiency는 κ S-curve를 추가 통과.
     * κ(케어 밀도): 기존 선형 min(π/0.50,1) 대신 π 30% inflection의 sigmoid.
     *   π<30%에서는 보수적으로 낮고, π가 50%에 가까워질수록 1에 수렴한다.
     * θ×regime: LOS 절감은 즉시 회수(DRG), post-acute·총비용 절감은 에피소드 책임구조에서만.
     *   순수 FFS ×0.10(사망) / TEAM ×0.85 / ACO ×1.0.
     * APCM↔VBC 게이트: 원격케어(APCM) 켜면 순수 FFS라도 θ 0.5 floor.
     *   APCM 청구가 ACO/REACH/MCP 참여를 요구하기 때문.
     *
     * ── 9. 파라미터 (3-tier) — 코드 SCEN ───────────────────────────────────
     *   pi(등록전환) .15/.30/.50 · margin(자동화순마진) .45/.60/.72 · adher .60/.75/.90
     *   awvRate/m1Rate/tcmRate(경로포착) .25.30.20 / .45.50.40 / .65.70.60
     *   dLOS/losReal .2/.40 · .4/.60 · .7/.85 · savEp 1088/1209/1640 · theta/lambda .10/.10 · .35/.25 · .60/.45
     *   hccVal/maVbc 200/.30 · 500/.55 · 1000/.75 · cmCase 2000/4000/7000
     *
     * ── 10. 코드 지도 ───────────────────────────────────────────────────────
     *   SCEN     — 3-tier 파라미터. 숫자 튜닝은 여기.
     *   REGIME   — 책임구조 4종·θ배수. 지불모델 추가는 여기.
     *   COHORTS + AWV_VAL·M1_VAL·TCM_VAL — journey 단위값. 스택·단가 수정 여기.
     *   COST_KEYS— λ 걸리는 원가 레버. B2 추가 시 등록.
     *   LEVERS   — 8개 레버 표시정보.
     *   compute()— 핵심 엔진. B1(경로)→B2(haircut→λ×κ→throughput)→B3(selBias→θ/maVbc)→net→payback.
     *              반환 parts에 레버·경로별 값.
     *   App()    — 화면·토글·waterfall·경로카드·경고·입력.  styles — 디자인 토큰.
     *
     * ── 11. 업그레이드 가이드 ───────────────────────────────────────────────
     * 새 레버 추가:
     *   1) 어느 레이어인지 결정(게이트·λ·θ 여부가 갈림).
     *   2) LEVERS에 추가 → compute()에 공식, parts에 추가.
     *   3) B2면 COST_KEYS 등록. B3면 θ·regime 또는 maVbc 곱.
     *   4) waterfall items·레버카드 val·초기 lv state에 추가.
     * 튜닝만: SCEN 숫자만. 근거(공개데이터/실측) 출처를 주석으로.
     * 커밋 전 체크리스트:
     *   [ ] 순수 FFS에서 B3(TM) 거의 죽고, telecare 켜면 θ 0.5 floor 뜨나?
     *   [ ] cost 레버 1개만 켜면 λ=0인가?
     *   [ ] 점유율 50%↓에서 throughput=0인가?
     *   [ ] PEPPER>80에서 RCM 반토막·경고 뜨나?
     *   [ ] 퇴원수 올리면 W·M1·M2(flow) 함께 커지나?
     *   [ ] capex가 net에서 안 빠지고 회수기간만 반영되나?
     *
     * ── 12. 알려진 한계 & 다음 버전 ─────────────────────────────────────────
     * - 파라미터 절반이 [DR]/[ASS] 추정 → 이 도구는 point estimate가 아니라 밴드·구조
     *   스크리너. data-room 열리면 실청구·실LOS·실점유로 교체.
     * - λ·κ는 근사(단일모듈도 완전히 깨끗하진 않음) → 신뢰구간으로.
     * - regime 단일 선택 → 실제는 TM-ACO·MA blend. v3.4 후보: TM 볼륨의 ACO/TEAM 편입률 분리.
     * - 경로 청구 적격률(AWV 연1회·TCM 30일 1회·배타규칙)이 이론최대와 실현치의 갭 → 실데이터 검증.
     *
     * ── 13. 용어집 ──────────────────────────────────────────────────────────
     * EBITDA(감가상각 전 영업이익) · capex/opex(구축비/운용비) · DRG(입원 정액지불)
     * HRRP(재입원 페널티 최대3%, TM) · MSPB/ACO(환자당 총지출/공유절감)
     * TEAM(2026 의무 번들) · APCM(월 번들 1차진료 관리, VBC 관문) · TCM(퇴원 전이케어)
     * AWV(연차건강검진) · PEPPER(코딩 outlier 리포트) · λ(원가 시너지 배수) · θ(회수율)
     * m(MA 원격 회수율) · mk(Medicaid 원격 회수율) · maVbc(MA 가치기반 회수율)
     *
     * ── 변경 이력 ───────────────────────────────────────────────────────────
     * v3.0  Capture×Coupling 2축 엔진 (payer×service 4-quadrant를 Capture 벡터로 흡수)
     * v3.1  capex/opex 분리 · 병상수/점유율(LOS throughput) · 에피소드 책임구조(θ regime)
     * v3.2  원격케어 코호트 풀스택 · LOS haircut · B3 분리(TM/MA) · APCM↔VBC 게이트
     * v3.3  legacy B1 경로 청구 엔진(W·M1·M2 flow / M3 stock=panel) · M1↔RCM 경계 분리
     * v3.5  CMS AHCAH 실측 savEp 밴드 적용 · selBias 보정계수 신설 · B3/LOS IC 방어문구 추가
     * v3.5.1 반응형 웹 레이아웃 적용(모바일 1컬럼 / 데스크톱 2컬럼)
     * v3.6  κ S-curve(π 30% inflection) 적용 · selBias를 MA HCC·품질에도 확장
     * v3.7  payer mix(TM/MA/Medicaid/Commercial) 명시 분리 · Medicaid mk=0.10 적용
     * v3.7.1 핵심 계산식 수동 편집 패널 추가 · 오류 시 기본식 fallback
     * v3.7.2  5개년 동적 확산 · B0 Volume Expansion · B4 RHTP · RCM 실현율 갭
     * v3.8    Patient Journey 정합 · IRS+ M1 activation ROI 레버
     *
     * ★ 한 줄 결론: 1차 컷으로 구조는 적정, 숫자는 밴드로만. 어느 레버가 어디서 움직이나를
     *   보는 스크리너로 쓰고, 프라이싱 확정은 [DR] 값 교체 후.
     * ============================================================================ */
        // ── 규칙 요약: TM=전체 · MA=원격×m+HCC · Medicaid=원격×mk+LOS · Commercial=계산 0 · λ/κ=LOS/HRR cross

        const SCEN = {
          cons: { label: "보수", pi: 0.15, margin: 0.45, adher: 0.60, m: 0.20, mk: 0.10, rcm: 0.005, rcmTarget: 21,
            conv: 0.10, avoid: 0.05, dLOS: 0.2, losReal: 0.40, dPen: 0.0005, agRed: 0.10,
            savEp: 1088, theta: 0.10, sSav: 0.10, lambda: 0.10, cmCase: 2000, hccVal: 200, maVbc: 0.30,
            awvRate: 0.25, m1Rate: 0.30, tcmRate: 0.20 },
          base: { label: "기본", pi: 0.30, margin: 0.60, adher: 0.75, m: 0.45, mk: 0.10, rcm: 0.010, rcmTarget: 22,
            conv: 0.20, avoid: 0.10, dLOS: 0.4, losReal: 0.60, dPen: 0.0015, agRed: 0.20,
            savEp: 1209, theta: 0.35, sSav: 0.20, lambda: 0.25, cmCase: 4000, hccVal: 500, maVbc: 0.55,
            awvRate: 0.45, m1Rate: 0.50, tcmRate: 0.40 },
          aggr: { label: "공격", pi: 0.50, margin: 0.72, adher: 0.90, m: 0.70, mk: 0.10, rcm: 0.018, rcmTarget: 24,
            conv: 0.35, avoid: 0.15, dLOS: 0.7, losReal: 0.85, dPen: 0.0030, agRed: 0.35,
            savEp: 1640, theta: 0.60, sSav: 0.35, lambda: 0.45, cmCase: 7000, hccVal: 1000, maVbc: 0.75,
            awvRate: 0.65, m1Rate: 0.70, tcmRate: 0.60 },
        };

        const REGIME = {
          ffs:  { label: "순수 FFS", mult: 0.10, note: "에피소드 책임 없음 · TM value 누수" },
          aco:  { label: "ACO",      mult: 1.00, note: "TM shared-savings 완전 회수" },
          team: { label: "TEAM 의무", mult: 0.85, note: "Part A 30일 에피소드 책임 (ACO 불요)" },
          ma:   { label: "MA 위험분담", mult: 0.70, note: "capitation 중심 · HRRP 없음" },
        };

        // 원격케어 풀스택 코호트 (M3 종단 루프). gross=월 청구($), 배타규칙 반영된 조합 단가
        const COHORTS = [
          { name: "만성 2+",  mix: 0.40, gross: 175, stack: "APCM L2 · RPM" },

          const enrolledTelecare = lv.telecare ? enrolled : 0;
          vars = { ...vars, enrolledTelecare };
          const gross = f("gross", vars);
          vars = { ...vars, gross };
          const opex = f("opex", vars);
          vars = { ...vars, opex };
          const net = f("net", vars);
          const capex = inp.capex * 1e6;
          const payback = net > 0 ? capex / net : null;
          const capMax = (inp.beds * 365 * 0.85) / Math.max(inp.avgLOS, 0.1);
          const capUtil = inp.discharges / capMax;

          return {
            parts: { telecare, clawback, rcm, selfpayConv, c_selfpay, c_los, c_hrr, c_agency, couplingGain, throughput, b3_tm, b3_ma, b3_medicaid, b3_commercial, cmsSavingsPool, synergyBase, w, m1, m2, m3, teleTM, teleMA, teleMedicaid, teleCommercial, irsCost, irsEligiblePatients, irsActivatedPatients, effPi, effAdher, effM1Rate, effTcmRate },
            b1, b2, b3, b3_tm, b3_ma, gross, opex, capex, net, payback,
            onCount, moduleScale, careKappa, couplingScale, occGate, capUtil, rmultEff, apcmActive, netPMPM, enrolled, teleGrossAll, selBias, mix, losEligible,
            formulaErrors,
            apcmFloor: apcmActive && REGIME[regime].mult < 0.5 && lv.value,
            pepperCapped: inp.pepper > 80 && lv.rcm,
          };
        }

        const VOLUME_RAMP = [0, 0.35, 0.65, 0.90, 1.00];
        const RHTP_RAMP = [0.50, 1.00, 1.00, 1.00, 1.00];

        function computeDynamic(p, lv, inp, regime, lambdaOverride, selBiasOverride, formulas = FORMULA_DEFAULTS) {
          const years = [];
          const errors = [];
          const fDyn = (name, vars) => safeEvalFormula(name, formulas, vars, errors, FORMULA_DEFAULTS[name]);
          const basePartA = inp.partA * 1e6;
          const baseGrossCharges = (inp.grossCharges || 0) * 1e6;
          const occTarget = Math.max(inp.occ, inp.occTarget || inp.occ);
          const localGrowthMax = inp.occ > 0 ? (occTarget - inp.occ) / inp.occ : 0;
          const targetPanel = Math.max(inp.panel, inp.panelTarget || inp.panel);
          const baseDynamicVars = {
            ...inp,
            ...p,
            baselineDischarges: inp.discharges,
            baselinePartA: inp.partA,
            baselinePartADollars: basePartA,
            baselinePanel: inp.panel,
            baselinePanelSafe: Math.max(inp.panel, 1),
            baselineOcc: inp.occ,
            baselineGrossChargesM: inp.grossCharges || 0,
            baselineGrossCharges: baseGrossCharges,
            occTarget,
            localGrowthMax,
            targetPanel,
            alpha: inp.alpha || 0,
            admissionConv: inp.admissionConv || 0,
            panelElasticity: inp.panelElasticity || 1,
            rhtpOffset: inp.rhtpOffset || 0,
            rhtpRecurring: inp.rhtpRecurring || 0,
            capex: inp.capex || 0,
          };
          const netInvestment = fDyn("netInvestment", baseDynamicVars);
          let cumulative = 0;
          let npv = fDyn("npvInitial", { ...baseDynamicVars, netInvestment });
          let paybackYear = null;

          for (let i = 0; i < 5; i += 1) {
            const baseVolumeRamp = VOLUME_RAMP[i];
            const baseRhtpRamp = RHTP_RAMP[i];
            const year2Flag = i === 0 ? 0 : 1;
            let dynVars = {
              ...baseDynamicVars,
              year: i + 1,
              baseVolumeRamp,
              baseRhtpRamp,
              year2Flag,
            };
            const volumeRamp = fDyn("volumeRamp", dynVars);
            dynVars = { ...dynVars, volumeRamp };
            const rhtpRamp = fDyn("rhtpRamp", dynVars);
            dynVars = { ...dynVars, rhtpRamp };
            const growthLocal = fDyn("growthLocal", dynVars);
            dynVars = { ...dynVars, growthLocal };
            const panelExpansion = fDyn("panelExpansion", dynVars);
            dynVars = { ...dynVars, panelExpansion };
            const growthPanel = fDyn("growthPanel", dynVars);
            dynVars = { ...dynVars, growthPanel };
            const totalGrowth = fDyn("totalGrowth", dynVars);
            dynVars = { ...dynVars, totalGrowth };
            const yearDischarges = fDyn("yearDischarges", dynVars);
            const yearPartA = fDyn("yearPartA", dynVars);
            const yearPanel = fDyn("yearPanel", dynVars);
            const yearOcc = fDyn("yearOcc", dynVars);
            const yearGrossCharges = fDyn("yearGrossCharges", dynVars);
            dynVars = { ...dynVars, yearDischarges, yearPartA, yearPanel, yearOcc, yearGrossCharges };
            const yearInputs = {
              ...inp,
              discharges: yearDischarges,
              partA: yearPartA,
              panel: yearPanel,
              occ: yearOcc,
              grossCharges: yearGrossCharges,
            };
            const result = compute(p, lv, yearInputs, regime, lambdaOverride, selBiasOverride, formulas, {
              hrrBasePartA: basePartA,
              grossCharges: baseGrossCharges,
            });
            errors.push(...result.formulaErrors);

            const b0Vars = {
              ...dynVars,
              ...yearInputs,
              ...p,
              baselineDischarges: inp.discharges,
              alpha: inp.alpha || 0,
              cmCase: p.cmCase,
              staticNet: result.net,
            };
            const b0Local = fDyn("b0Local", b0Vars);
            const b0Panel = fDyn("b0Panel", { ...b0Vars, b0Local });
            const b0Active = fDyn("b0Active", { ...b0Vars, b0Local, b0Panel });
            const b0 = fDyn("b0", { ...b0Vars, b0Local, b0Panel, b0Active });
            const b4 = fDyn("b4", { ...b0Vars, b0Local, b0Panel, b0Active, b0 });
            const net = fDyn("dynamicNet", { ...b0Vars, b0Local, b0Panel, b0Active, b0, b4 });
            const npvTerm = fDyn("npvTerm", { ...b0Vars, b0Local, b0Panel, b0Active, b0, b4, dynamicNet: net, netInvestment });

            cumulative += net;
            npv += npvTerm;
            if (paybackYear == null && cumulative >= netInvestment) paybackYear = i + 1;

            years.push({
              year: i + 1,
              ramp: volumeRamp,
              rhtpRamp,
              inputs: yearInputs,
              result,
              b0Local,
              b0Panel,
              b0Active,
              b0,
              b4,
              b1: result.b1,
              b2: result.b2,
              b3: result.b3,
              opex: result.opex,
              net,
              cumulative,
            });
          }

          const y5 = years[4];
          const b4Cumulative = years.reduce((sum, y) => sum + y.b4, 0);
          const totalEconomicImpact = fDyn("totalEconomicImpact", {
            ...baseDynamicVars,
            y5Net: y5.net,
            b4Y5: y5.b4,
            b4Cumulative,
            cumulative,
            npv,
            netInvestment,
          });
          return {
            years,
            y5,
            cumulative,
            npv,
            paybackYear,
            netInvestment,
            b4Cumulative,
            totalEconomicImpact,
            errors,
          };
        }

            return { lo: Math.min(lo, hi), hi: Math.max(lo, hi) };
          }, [lv, inp, regime, selBias, formulas]);
          const DYN = useMemo(() => computeDynamic(SCEN[scen], lv, inp, regime, lambda, selBias, formulas), [scen, lv, inp, regime, lambda, selBias, formulas]);
          const viewport = useViewport();

          const maxAbs = Math.max(...items.map((i) => Math.abs(i.v)), 1);

          return (

                    {showStack && (
