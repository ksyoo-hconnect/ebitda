<body style="margin: 0; padding: 0; background: #0d1017;">

    <script type="text/babel">
        if (!window.React || !window.ReactDOM) {
          document.getElementById("root").innerHTML = "React or ReactDOM failed to load from CDN.";
          throw new Error("React or ReactDOM failed to load from CDN.");
        }

        const {useEffect, useMemo, useState} = React;

        function useViewport() {
          const getWidth = () => (typeof window === "undefined" ? 480 : window.innerWidth);
          const [width, setWidth] = useState(getWidth);
          useEffect(() => {
            const onResize = () => setWidth(getWidth());
            window.addEventListener("resize", onResize);
            return () => window.removeEventListener("resize", onResize);
          }, []);
          return width;
        }

        function InlineIcon({children, size = 13, color = "currentColor"}) {
          return (
            <span
              aria-hidden="true"
              style={{
                display: "inline-flex",
                alignItems: "center",
                justifyContent: "center",
                width: size,
                height: size,
                color,
                fontSize: size,
                lineHeight: 1,
                flexShrink: 0,
              }}
            >
              {children}
            </span>
          );
        }

        const Power = (props) => <InlineIcon {...props}>⏻</InlineIcon>;
        const TriangleAlert = (props) => <InlineIcon {...props}>!</InlineIcon>;
        const Link2 = (props) => <InlineIcon {...props}>↔</InlineIcon>;
        const Layers = (props) => <InlineIcon {...props}>≡</InlineIcon>;
        const Building2 = (props) => <InlineIcon {...props}>▦</InlineIcon>;
        const Activity = (props) => <InlineIcon {...props}>⌁</InlineIcon>;

        // (위 설명서 헤더가 여기 위치)
    /* ============================================================================
     * 루프 적용 EBITDA 개선 추정모델 — 팀 설명서 (v3.7.1)
     * ============================================================================
     * 이 헤더는 코드와 함께 버전관리되는 정식 문서입니다. 모델 수정 시 이 헤더도
     * 함께 갱신하십시오. 버전 번호는 파일명·kicker·이 헤더·footer 4곳을 일치시킬 것.
     *
     * ── 0. 이 문서의 사용법 ──────────────────────────────────────────────────
     * 처음 보는 팀원: §1~2(30초·철학)만 읽어도 무엇인지 안다.
     * 숫자를 만지는 사람: §5~9. 코드를 고치는 사람: §10~12.
     * §3(가드레일)은 전원 필독 — 여기를 어기면 모델이 조용히 틀린다.
     *
     * ── 1. 30초 요약 ────────────────────────────────────────────────────────
     * 인수 대상 병원 수치를 넣으면, 인바이츠루프 도입 시 연간 EBITDA 개선폭을
     * 추정한다. 8개 레버 ON/OFF(단계적 도입·미실행 반영), 레버 기여·순ΔEBITDA·
     * 회수기간이 실시간. 핵심 명제: "레버가 만든 돈 ≠ 병원이 가져가는 돈."
     * 지불구조에 따라 만든 돈이 CMS로 새므로, "얼마 만들었나"와 "얼마 회수하나"를
     * 반드시 분리한다.
     *
     * ── 2. 두 축의 철학 ─────────────────────────────────────────────────────
     * 축1 — 무엇이 돈을 만드나 → 3개 레이어(B1/B2/B3)
     * 축2 — 누가 그 돈을 회수하나 → 게이트(Capture)
     * 한 줄: ΔEBITDA = B1(payer mix 게이팅) + B2(payer-eligible)×(1+λ×κ) + B3(TM/MA only) − opex
     *        (capex는 EBITDA 밖, 회수기간에만.)
     *
     * ── 3. 가드레일 — 전원 필독 (이중계상 방지) ─────────────────────────────
     * (1) 게이트는 한 곳에. "누가 회수하나"는 전부 Capture에서. m·θ·%TM을 여러 군데
     *     흩뿌리면 같은 달러를 두 번 깎거나 더한다.
     * (2) λ는 B2(원가)에만. 원가 레버 간 상호작용(초가법성)만. 매출·가치층 금지.
     * (3) θ는 B3의 TM shared savings에만. DRG 고정 원가(LOS)는 100% 회수라 θ 불필요.
     * (4) 케어 인건비는 한 번만. 원격케어 margin에 이미 반영 → opex 환자당은 플랫폼 몫만.
     * (5) 경로 청구 이중계상 두 곳: M1(입원 Part B) ↔ RCM(Part A DRG)은 별개 stream.
     *     W(AWV) → M3(APCM)은 순차지 중복 아님.
     * ★ 새 레버 추가 시 반드시 이 다섯에 비춰 검토.
     *
     * ── 4. 3개 레이어 ───────────────────────────────────────────────────────
     * B1 직접수익  | 청구 현금        | 원격케어(경로)·RCM·Self-Pay전환 | payer 게이팅   | 확실성 높음
     * B2 운영효율  | 원가·throughput | Self-Pay원가·LOS·HRR·Agency    | LOS/HRR ×(1+λ×κ) | 중간
     * B3 가치기반  | 시스템 절감      | VBC(TM shared / MA HCC)        | selBias×θ·regime / selBias×maVbc | 지불구조 종속
     *
     * ── 5. B1 경로 청구 엔진 (v3.3 핵심) ────────────────────────────────────
     * 원격케어는 단일 PMPM이 아니라 환자 경로 전 구간 청구. 모수가 둘로 갈림:
     *   W  예방·관문  = panel × AWV포착률 × $150 × margin      (flow; APCM 개시 관문)
     *   M1 입원 PartB = 퇴원수 × $400 × 포착률 × margin         (flow; RCM=Part A와 별개)
     *   M2 퇴원후 TCM = 퇴원수 × TCM적격률 × $230 × margin       (flow; 99495/96, 30일 1회)
     *   M3 종단       = 등록panel(panel×π) × netPMPM × 12       (stock; APCM·RPM 코호트 스택)
     * W·M1·M2는 퇴원수(flow), M3만 등록 panel(stock)에 연동 → 볼륨·throughput 늘면 B1 증가.
     * 합계에 payer 스플릿(TM×1 / MA×m / Medicaid×mk / Commercial×0) + ACO 음결합 차감.
     * M3 코호트 스택: 만성(APCM L2+RPM)·QMB복합(L3+RPM+BHI)·행동건강(+CoCM)·경증(L1).
     * 가중 gross ~$181/월 × margin × adherence. 배타규칙(APCM↔CCM·PCM·TCM)이라 18코드 합 아님.
     *
     * ── 6. B2 원가 — LOS haircut ────────────────────────────────────────────
     * ΔLOS × 1일당변동비 × (퇴원수 × 대상비중) × realizable haircut + throughput.
     *   대상비중: pathway 최적화 가능 퇴원 서브셋(전체 아님).
     *   realizable haircut: 진짜 원가에서 빠지는 몫만(0.4일 단축이 곧 FTE절감 아님 — step-fixed 착시).
     *   throughput: 빈 병상→신규환자, 점유율 게이팅(55%↓ 거의 0, 85%+ 완전 실현).
     *
     * ── 7. B3 VBC — CMS AHCAH 실측 앵커 ─────────────────────────────────────
     *   TM shared savings = 퇴원수 × %TM × ACO귀속 × CMS 절감/에피소드 × selBias × θ × regime배수
     *   MA HCC·품질       = MA lives × HCC값 × maVbc × selBias  (선택편의 보수 반영)
     * CMS AHCAH 30일 절감 밴드: 보수 $1,088(top-10 볼륨가중에 선택편의 보수 반영),
     *   기본 $1,209(볼륨가중 raw), 공격 $1,640(CMS Overall, 25 DRG).
     * selBias 기본 0.90은 HCC gap(2.04/2.26≈0.90)을 이용한 순귀속 근사. TM shared
     *   savings와 MA HCC·품질 업사이드에 모두 적용하되, 정식 위험보정 point estimate가
     *   아니라 밴드 조정계수다.
     * IC 방어: B3는 payer 절감 풀이지 병원 EBITDA가 아니다. 반드시 θ·regime을 통과해야 한다.
     * IC 방어: LOS 레버를 AHCAH 데이터로 정당화하지 말 것. AHCAH LOS는 오히려 +0.79일.
     *
     * ── 8. λ·θ·regime — 오해 방지 ──────────────────────────────────────────
     * λ(원가 시너지): 원가 레버 함께 켜면 각자 합보다 더 나오는 부분. 2개↑ ON에서만
     *   작동하되, 원격케어가 켜진 LOS/HRR cross-efficiency는 κ S-curve를 추가 통과.
     * κ(케어 밀도): 기존 선형 min(π/0.50,1) 대신 π 30% inflection의 sigmoid.
     *   π<30%에서는 보수적으로 낮고, π가 50%에 가까워질수록 1에 수렴한다.
     * θ×regime: LOS 절감은 즉시 회수(DRG), post-acute·총비용 절감은 에피소드 책임구조에서만.
     *   순수 FFS ×0.10(사망) / TEAM ×0.85 / ACO ×1.0.
     * APCM↔VBC 게이트: 원격케어(APCM) 켜면 순수 FFS라도 θ 0.5 floor.
     *   APCM 청구가 ACO/REACH/MCP 참여를 요구하기 때문.
     *
     * ── 9. 파라미터 (3-tier) — 코드 SCEN ───────────────────────────────────
     *   pi(등록전환) .15/.30/.50 · margin(자동화순마진) .45/.60/.72 · adher .60/.75/.90
     *   awvRate/m1Rate/tcmRate(경로포착) .25.30.20 / .45.50.40 / .65.70.60
     *   dLOS/losReal .2/.40 · .4/.60 · .7/.85 · savEp 1088/1209/1640 · theta/lambda .10/.10 · .35/.25 · .60/.45
     *   hccVal/maVbc 200/.30 · 500/.55 · 1000/.75 · cmCase 2000/4000/7000
     *
     * ── 10. 코드 지도 ───────────────────────────────────────────────────────
     *   SCEN     — 3-tier 파라미터. 숫자 튜닝은 여기.
     *   REGIME   — 책임구조 4종·θ배수. 지불모델 추가는 여기.
     *   COHORTS + AWV_VAL·M1_VAL·TCM_VAL — 경로 청구 단위값. 스택·단가 수정 여기.
     *   COST_KEYS— λ 걸리는 원가 레버. B2 추가 시 등록.
     *   LEVERS   — 8개 레버 표시정보.
     *   compute()— 핵심 엔진. B1(경로)→B2(haircut→λ×κ→throughput)→B3(selBias→θ/maVbc)→net→payback.
     *              반환 parts에 레버·경로별 값.
     *   App()    — 화면·토글·waterfall·경로카드·경고·입력.  styles — 디자인 토큰.
     *
     * ── 11. 업그레이드 가이드 ───────────────────────────────────────────────
     * 새 레버 추가:
     *   1) 어느 레이어인지 결정(게이트·λ·θ 여부가 갈림).
     *   2) LEVERS에 추가 → compute()에 공식, parts에 추가.
     *   3) B2면 COST_KEYS 등록. B3면 θ·regime 또는 maVbc 곱.
     *   4) waterfall items·레버카드 val·초기 lv state에 추가.
     * 튜닝만: SCEN 숫자만. 근거(공개데이터/실측) 출처를 주석으로.
     * 커밋 전 체크리스트:
     *   [ ] 순수 FFS에서 B3(TM) 거의 죽고, telecare 켜면 θ 0.5 floor 뜨나?
     *   [ ] cost 레버 1개만 켜면 λ=0인가?
     *   [ ] 점유율 50%↓에서 throughput=0인가?
     *   [ ] PEPPER>80에서 RCM 반토막·경고 뜨나?
     *   [ ] 퇴원수 올리면 W·M1·M2(flow) 함께 커지나?
     *   [ ] capex가 net에서 안 빠지고 회수기간만 반영되나?
     *
     * ── 12. 알려진 한계 & 다음 버전 ─────────────────────────────────────────
     * - 파라미터 절반이 [DR]/[ASS] 추정 → 이 도구는 point estimate가 아니라 밴드·구조
     *   스크리너. data-room 열리면 실청구·실LOS·실점유로 교체.
     * - λ·κ는 근사(단일모듈도 완전히 깨끗하진 않음) → 신뢰구간으로.
     * - regime 단일 선택 → 실제는 TM-ACO·MA blend. v3.4 후보: TM 볼륨의 ACO/TEAM 편입률 분리.
     * - 경로 청구 적격률(AWV 연1회·TCM 30일 1회·배타규칙)이 이론최대와 실현치의 갭 → 실데이터 검증.
     *
     * ── 13. 용어집 ──────────────────────────────────────────────────────────
     * EBITDA(감가상각 전 영업이익) · capex/opex(구축비/운용비) · DRG(입원 정액지불)
     * HRRP(재입원 페널티 최대3%, TM) · MSPB/ACO(환자당 총지출/공유절감)
     * TEAM(2026 의무 번들) · APCM(월 번들 1차진료 관리, VBC 관문) · TCM(퇴원 전이케어)
     * AWV(연차건강검진) · PEPPER(코딩 outlier 리포트) · λ(원가 시너지 배수) · θ(회수율)
     * m(MA 원격 회수율) · mk(Medicaid 원격 회수율) · maVbc(MA 가치기반 회수율)
     *
     * ── 변경 이력 ───────────────────────────────────────────────────────────
     * v3.0  Capture×Coupling 2축 엔진 (payer×service 4-quadrant를 Capture 벡터로 흡수)
     * v3.1  capex/opex 분리 · 병상수/점유율(LOS throughput) · 에피소드 책임구조(θ regime)
     * v3.2  원격케어 코호트 풀스택 · LOS haircut · B3 분리(TM/MA) · APCM↔VBC 게이트
     * v3.3  B1 경로 청구 엔진(W·M1·M2 flow=퇴원수 / M3 stock=panel) · M1↔RCM 경계 분리
     * v3.5  CMS AHCAH 실측 savEp 밴드 적용 · selBias 보정계수 신설 · B3/LOS IC 방어문구 추가
     * v3.5.1 반응형 웹 레이아웃 적용(모바일 1컬럼 / 데스크톱 2컬럼)
     * v3.6  κ S-curve(π 30% inflection) 적용 · selBias를 MA HCC·품질에도 확장
     * v3.7  payer mix(TM/MA/Medicaid/Commercial) 명시 분리 · Medicaid mk=0.10 적용
     * v3.7.1 핵심 계산식 수동 편집 패널 추가 · 오류 시 기본식 fallback
     *
     * ★ 한 줄 결론: 1차 컷으로 구조는 적정, 숫자는 밴드로만. 어느 레버가 어디서 움직이나를
     *   보는 스크리너로 쓰고, 프라이싱 확정은 [DR] 값 교체 후.
     * ============================================================================ */
        // ── 규칙 요약: TM=전체 · MA=원격×m+HCC · Medicaid=원격×mk+LOS · Commercial=계산 0 · λ/κ=LOS/HRR cross

        const SCEN = {
          cons: { label: "보수", pi: 0.15, margin: 0.45, adher: 0.60, m: 0.20, mk: 0.10, rcm: 0.005,
            conv: 0.10, avoid: 0.05, dLOS: 0.2, losReal: 0.40, dPen: 0.0005, agRed: 0.10,
            savEp: 1088, theta: 0.10, sSav: 0.10, lambda: 0.10, cmCase: 2000, hccVal: 200, maVbc: 0.30,
            awvRate: 0.25, m1Rate: 0.30, tcmRate: 0.20 },
          base: { label: "기본", pi: 0.30, margin: 0.60, adher: 0.75, m: 0.45, mk: 0.10, rcm: 0.010,
            conv: 0.20, avoid: 0.10, dLOS: 0.4, losReal: 0.60, dPen: 0.0015, agRed: 0.20,
            savEp: 1209, theta: 0.35, sSav: 0.20, lambda: 0.25, cmCase: 4000, hccVal: 500, maVbc: 0.55,
            awvRate: 0.45, m1Rate: 0.50, tcmRate: 0.40 },
          aggr: { label: "공격", pi: 0.50, margin: 0.72, adher: 0.90, m: 0.70, mk: 0.10, rcm: 0.018,
            conv: 0.35, avoid: 0.15, dLOS: 0.7, losReal: 0.85, dPen: 0.0030, agRed: 0.35,
            savEp: 1640, theta: 0.60, sSav: 0.35, lambda: 0.45, cmCase: 7000, hccVal: 1000, maVbc: 0.75,
            awvRate: 0.65, m1Rate: 0.70, tcmRate: 0.60 },
        };

        const REGIME = {
          ffs:  { label: "순수 FFS", mult: 0.10, note: "에피소드 책임 없음 · TM value 누수" },
          aco:  { label: "ACO",      mult: 1.00, note: "TM shared-savings 완전 회수" },
          team: { label: "TEAM 의무", mult: 0.85, note: "Part A 30일 에피소드 책임 (ACO 불요)" },
          ma:   { label: "MA 위험분담", mult: 0.70, note: "capitation 중심 · HRRP 없음" },
        };

        // 원격케어 풀스택 코호트 (M3 종단 루프). gross=월 청구($), 배타규칙 반영된 조합 단가
        const COHORTS = [
          { name: "만성 2+",  mix: 0.40, gross: 175, stack: "APCM L2 · RPM" },
          { name: "QMB 복합", mix: 0.15, gross: 320, stack: "APCM L3 · RPM · BHI" },
          { name: "행동건강",  mix: 0.15, gross: 260, stack: "APCM · RPM · CoCM" },
          { name: "퇴원후",   mix: 0.10, gross: 200, stack: "TCM 30일" },
          { name: "경증 L1",  mix: 0.20, gross: 20,  stack: "APCM L1" },
        ];
        const WEIGHTED_GROSS = COHORTS.reduce((s, c) => s + c.mix * c.gross, 0);

        // 경로 flow 청구 단위값($). W=AWV+스크리닝/명/년, M1=입원당 포착가능 Part B(전문의료), M2=TCM/퇴원건
        const AWV_VAL = 150; // W: 연차건강검진 + 스크리닝
        const M1_VAL = 400;  // M1: 입원당 전문의료(Part B) 포착 — RCM(Part A DRG/CMI)과 별개 stream
        const TCM_VAL = 230; // M2: TCM 99495/96 (퇴원 후 30일 1회)

        const COST_KEYS = ["selfpayCost", "los", "hrr", "agency"];

        const LEVERS = [
          { key: "telecare",    layer: "B1", name: "원격케어 (경로 W→M3)", sub: "AWV·Part B·TCM·APCM 전구간 포착", cap: "TM ×1 / MA ×m / Medicaid ×mk / Commercial ×0" },
          { key: "rcm",         layer: "B1", name: "RCM·CDI",        sub: "청구누수·CMI 보정",           cap: "×1.0 (PEPPER 상한)" },
          { key: "selfpayConv", layer: "B1", name: "Self-Pay 전환",  sub: "보험 적격성 전환",             cap: "×1.0" },
          { key: "selfpayCost", layer: "B2", name: "Self-Pay 원가회피", sub: "대면→비대면 원가 회피",       cap: "×1.0" },
          { key: "los",         layer: "B2", name: "LOS 단축",        sub: "변동비(addr×real) + throughput", cap: "TM+Medicaid만 · λ×κ" },
          { key: "hrr",         layer: "B2", name: "HRR 재입원",      sub: "HRRP 페널티 회피",             cap: "×%TM · λ×κ" },
          { key: "agency",      layer: "B2", name: "Agency Labor",   sub: "파견인력 축소",                cap: "×1.0" },
          { key: "value",       layer: "B3", name: "VBC",            sub: "TM shared savings + MA HCC·품질", cap: "TM shared / MA HCC only · Medicaid/Commercial 0" },
        ];

        const LAYER_META = {
          B1: { name: "Direct Revenue", color: "#4FD1C5", tag: "TM/MA/Medicaid payer-gated" },
          B2: { name: "Cost Efficiency", color: "#F6C177", tag: "TM+Medicaid LOS · TM HRR" },
          B3: { name: "Value-Based",     color: "#B39DDB", tag: "TM θ / MA maVbc only" },
        };

        const DEFAULT_INPUTS = {
          discharges: 8000, partA: 130, varCostDay: 1200, avgLOS: 4.6,
          beds: 250, occ: 62,
          tmPct: 35, maPct: 10, medicaidPct: 25, panel: 6000, hrrpRate: 0.55, acoShare: 30, losAddr: 55,
          selfPay: 8, agency: 12, pepper: 60,
          capex: 8, opexFixed: 2.0, opexPerPt: 60,
        };

        const FORMULA_DEFAULTS = {
          netPMPM: "weightedGross * margin * adher",
          enrolled: "panel * pi",
          w: "panel * awvRate * AWV_VAL * margin",
          m1: "discharges * M1_VAL * m1Rate * margin",
          m2: "discharges * tcmRate * TCM_VAL * margin",
          m3: "enrolled * netPMPM * 12",
          teleTM: "teleGrossAll * tm",
          teleMA: "teleGrossAll * ma * m",
          teleMedicaid: "teleGrossAll * medicaid * mk",
          teleCommercial: "0",
          clawback: "teleTM * aco * sSav",
          rcm: "partA * rcmRate * pepperCap",
          selfpayConv: "selfPay * conv",
          b1: "telecare - clawback + rcm + selfpayConv",
          c_selfpay: "selfPay * avoid",
          addrDisch: "discharges * losEligible * losAddr / 100",
          c_los: "dLOS * varCostDay * addrDisch * losReal",
          c_hrr: "dPen * partA * tm",
          c_agency: "agency * agRed",
          costBase: "c_selfpay + c_los + c_hrr + c_agency",
          couplingGain: "synergyBase * lambda * couplingScale",
          throughput: "addlDischarges * occGate * cmCase",
          b2: "costBase + couplingGain + throughput",
          cmsSavingsPool: "discharges * tm * aco * savEp",
          b3_tm: "cmsSavingsPool * selBias * theta * rmultEff",
          b3_ma: "panel * ma * hccVal * maVbc * selBias",
          b3: "b3_tm + b3_ma",
          opex: "opexFixed * 1000000 + enrolledTelecare * opexPerPt",
          gross: "b1 + b2 + b3",
          net: "gross - opex",
        };

        const FORMULA_META = [
          { key: "netPMPM", label: "M3 net PMPM", group: "B1 경로" },
          { key: "enrolled", label: "등록 panel", group: "B1 경로" },
          { key: "w", label: "W 예방·관문", group: "B1 경로" },
          { key: "m1", label: "M1 입원 Part B", group: "B1 경로" },
          { key: "m2", label: "M2 퇴원후 TCM", group: "B1 경로" },
          { key: "m3", label: "M3 종단 관리", group: "B1 경로" },
          { key: "teleTM", label: "TM 원격 회수", group: "payer 회수" },
          { key: "teleMA", label: "MA 원격 회수", group: "payer 회수" },
          { key: "teleMedicaid", label: "Medicaid 원격 회수", group: "payer 회수" },
          { key: "teleCommercial", label: "Commercial 원격 회수", group: "payer 회수" },
          { key: "clawback", label: "ACO 음결합", group: "B1 경로" },
          { key: "rcm", label: "RCM·CDI", group: "B1 기타" },
          { key: "selfpayConv", label: "Self-Pay 전환", group: "B1 기타" },
          { key: "b1", label: "B1 합계", group: "B1 기타" },
          { key: "c_selfpay", label: "Self-Pay 원가회피", group: "B2 원가" },
          { key: "addrDisch", label: "LOS 대상 퇴원수", group: "B2 원가" },
          { key: "c_los", label: "LOS 변동비 절감", group: "B2 원가" },
          { key: "c_hrr", label: "HRR 절감", group: "B2 원가" },
          { key: "c_agency", label: "Agency Labor 절감", group: "B2 원가" },
          { key: "costBase", label: "B2 원가 기본합", group: "B2 원가" },
          { key: "couplingGain", label: "λ·κ 커플링", group: "B2 원가" },
          { key: "throughput", label: "throughput", group: "B2 원가" },
          { key: "b2", label: "B2 합계", group: "B2 원가" },
          { key: "cmsSavingsPool", label: "CMS 절감 풀", group: "B3 가치" },
          { key: "b3_tm", label: "TM shared savings", group: "B3 가치" },
          { key: "b3_ma", label: "MA HCC·품질", group: "B3 가치" },
          { key: "b3", label: "B3 합계", group: "B3 가치" },
          { key: "opex", label: "Loop 운용비", group: "최종" },
          { key: "gross", label: "gross 개선액", group: "최종" },
          { key: "net", label: "순 ΔEBITDA", group: "최종" },
        ];

        const clamp01 = (x) => Math.max(0, Math.min(1, x));
        const clampPct = (x) => Math.max(0, Math.min(100, Number.isFinite(x) ? x : 0));
        function safeEvalFormula(name, formulas, vars, errors, fallbackExpr) {
          const expr = String((formulas && formulas[name]) || fallbackExpr || FORMULA_DEFAULTS[name] || "").trim();
          const fallback = fallbackExpr && fallbackExpr !== expr
            ? safeEvalFormula(`${name}:fallback`, FORMULA_DEFAULTS, vars, errors, fallbackExpr)
            : 0;
          const bad = !expr ||
            /(?:window|document|globalThis|Function|constructor|prototype|=>|;|\[|\]|\{|\}|=|`|'|")/i.test(expr) ||
            !/^[0-9A-Za-z_+\-*/%().,\s]+$/.test(expr) ||
            /[A-Za-z_][A-Za-z0-9_]*\s*\./.test(expr) ||
            /\.\s*[A-Za-z_]/.test(expr);
          if (bad) {
            if (!name.endsWith(":fallback")) errors.push(`${name}: 허용되지 않는 수식`);
            return fallback;
          }
          try {
            const scope = {
              ...vars,
              min: Math.min,
              max: Math.max,
              abs: Math.abs,
              round: Math.round,
              floor: Math.floor,
              ceil: Math.ceil,
              pow: Math.pow,
            };
            const keys = Object.keys(scope);
            const values = keys.map((k) => scope[k]);
            const fn = new Function(...keys, `"use strict"; return (${expr});`);
            const value = Number(fn(...values));
            if (!Number.isFinite(value)) throw new Error("not finite");
            return value;
          } catch (e) {
            if (!name.endsWith(":fallback")) errors.push(`${name}: 계산 실패, 기본식 사용`);
            return fallback;
          }
        }
        function payerMix(inp) {
          const rawTmPct = clampPct(inp.tmPct);
          const rawMaPct = clampPct(inp.maPct);
          const rawMedicaidPct = clampPct(inp.medicaidPct);
          const rawTotal = rawTmPct + rawMaPct + rawMedicaidPct;
          const scale = rawTotal > 100 ? 100 / rawTotal : 1;
          const tmPct = rawTmPct * scale;
          const maPct = rawMaPct * scale;
          const medicaidPct = rawMedicaidPct * scale;
          const commercialPct = Math.max(0, 100 - tmPct - maPct - medicaidPct);
          return {
            tm: tmPct / 100,
            ma: maPct / 100,
            medicaid: medicaidPct / 100,
            commercial: commercialPct / 100,
            tmPct,
            maPct,
            medicaidPct,
            commercialPct,
            rawTotal,
            scaled: rawTotal > 100,
          };
        }
        function careKappaFromPi(pi) {
          const midpoint = 0.30;
          const steepness = 24;
          const fullAt = 0.50;
          const sigmoid = (x) => 1 / (1 + Math.exp(-steepness * (x - midpoint)));
          const low = sigmoid(0);
          const high = sigmoid(fullAt);
          return clamp01((sigmoid(pi) - low) / (high - low));
        }

        function compute(p, lv, inp, regime, lambdaOverride, selBiasOverride, formulas = FORMULA_DEFAULTS) {
          const formulaErrors = [];
          const mix = payerMix(inp);
          const { tm, ma, medicaid, commercial } = mix;
          const aco = inp.acoShare / 100, occ = inp.occ / 100;
          const partA = inp.partA * 1e6, selfPay = inp.selfPay * 1e6, agency = inp.agency * 1e6;
          const lam = lambdaOverride != null ? lambdaOverride : p.lambda;
          const selBias = selBiasOverride != null ? selBiasOverride : 0.90;
          const f = (name, vars) => safeEvalFormula(name, formulas, vars, formulaErrors, FORMULA_DEFAULTS[name]);

          let vars = {
            ...inp,
            ...p,
            AWV_VAL,
            M1_VAL,
            TCM_VAL,
            weightedGross: WEIGHTED_GROSS,
            partA,
            partAM: inp.partA,
            selfPay,
            selfPayM: inp.selfPay,
            agency,
            agencyM: inp.agency,
            tm,
            ma,
            medicaid,
            commercial,
            tmPct: mix.tmPct,
            maPct: mix.maPct,
            medicaidPct: mix.medicaidPct,
            commercialPct: mix.commercialPct,
            aco,
            occ,
            occPct: inp.occ,
            lambda: lam,
            selBias,
            rcmRate: p.rcm,
          };

          // ── B1: 경로 청구 엔진 (flow: 퇴원수 / stock: panel) ──
          const netPMPM = f("netPMPM", vars);      // M3 stock 스택 단가
          vars = { ...vars, netPMPM };
          const enrolled = f("enrolled", vars);
          vars = { ...vars, enrolled };
          const w  = f("w", vars);                 // W (flow≈연 panel)
          const m1 = f("m1", vars);                // M1 (flow: 퇴원수·Part B)
          const m2 = f("m2", vars);                // M2 (flow: 퇴원수·TCM)
          vars = { ...vars, w, m1, m2 };
          const m3 = f("m3", vars);                // M3 (stock: 등록 panel)
          vars = { ...vars, m3 };
          const teleGrossAll = lv.telecare ? (w + m1 + m2 + m3) : 0;
          vars = { ...vars, teleGrossAll };
          const teleTM = lv.telecare ? f("teleTM", vars) : 0;
          vars = { ...vars, teleTM };
          const teleMA = lv.telecare ? f("teleMA", vars) : 0;
          vars = { ...vars, teleMA };
          const teleMedicaid = lv.telecare ? f("teleMedicaid", vars) : 0;
          vars = { ...vars, teleMedicaid };
          const teleCommercial = lv.telecare ? f("teleCommercial", vars) : 0;
          vars = { ...vars, teleCommercial };
          const telecare = lv.telecare ? teleTM + teleMA + teleMedicaid + teleCommercial : 0;
          vars = { ...vars, telecare };
          const clawback = lv.telecare ? f("clawback", vars) : 0;
          vars = { ...vars, clawback };
          const apcmActive = lv.telecare;
          const pepperCap = inp.pepper > 80 ? 0.5 : 1.0;
          vars = { ...vars, pepperCap };
          const rcm = lv.rcm ? f("rcm", vars) : 0;
          vars = { ...vars, rcm };
          const selfpayConv = lv.selfpayConv ? f("selfpayConv", vars) : 0;
          vars = { ...vars, selfpayConv };
          const b1 = f("b1", vars);
          vars = { ...vars, b1 };

          // ── B2: cost (haircut 반영) ──
          const c_selfpay = lv.selfpayCost ? f("c_selfpay", vars) : 0;
          vars = { ...vars, c_selfpay };
          const losEligible = tm + medicaid;
          vars = { ...vars, losEligible };
          const addrDisch = f("addrDisch", vars);
          vars = { ...vars, addrDisch };
          const c_los = lv.los ? f("c_los", vars) : 0;
          vars = { ...vars, c_los };
          const c_hrr = lv.hrr ? f("c_hrr", vars) : 0;
          vars = { ...vars, c_hrr };
          const c_agency = lv.agency ? f("c_agency", vars) : 0;
          vars = { ...vars, c_agency };
          const costBase = f("costBase", vars);
          vars = { ...vars, costBase };
          const onCount = COST_KEYS.filter((k) => lv[k]).length;
          const moduleScale = onCount >= 2 ? (onCount - 1) / (COST_KEYS.length - 1) : 0;
          const careKappa = lv.telecare ? careKappaFromPi(p.pi) : 0;
          const couplingScale = moduleScale * careKappa;
          const synergyBase = c_los + c_hrr;
          vars = { ...vars, onCount, moduleScale, careKappa, couplingScale, synergyBase };
          const couplingGain = f("couplingGain", vars);
          vars = { ...vars, couplingGain };

          const freedBedDays = lv.los ? p.dLOS * addrDisch : 0;
          const addlDischarges = freedBedDays / Math.max(inp.avgLOS, 0.1);
          const occGate = Math.max(0, Math.min(1, (occ - 0.50) / (0.85 - 0.50)));
          vars = { ...vars, freedBedDays, addlDischarges, occGate };
          const throughput = lv.los ? f("throughput", vars) : 0;
          vars = { ...vars, throughput };
          const b2 = f("b2", vars);
          vars = { ...vars, b2 };

          // ── B3: VBC 분리 ──
          const rmultEff = apcmActive ? Math.max(REGIME[regime].mult, 0.5) : REGIME[regime].mult; // APCM↔VBC 게이트
          vars = { ...vars, rmultEff };
          const cmsSavingsPool = lv.value ? f("cmsSavingsPool", vars) : 0;
          vars = { ...vars, cmsSavingsPool };
          const b3_tm = lv.value ? f("b3_tm", vars) : 0;
          vars = { ...vars, b3_tm };
          const b3_ma = lv.value ? f("b3_ma", vars) : 0;
          vars = { ...vars, b3_ma };
          const b3_medicaid = 0;
          const b3_commercial = 0;
          const b3 = f("b3", vars);
          vars = { ...vars, b3, b3_medicaid, b3_commercial };

          const enrolledTelecare = lv.telecare ? enrolled : 0;
          vars = { ...vars, enrolledTelecare };
          const gross = f("gross", vars);
          vars = { ...vars, gross };
          const opex = f("opex", vars);
          vars = { ...vars, opex };
          const net = f("net", vars);
          const capex = inp.capex * 1e6;
          const payback = net > 0 ? capex / net : null;
          const capMax = (inp.beds * 365 * 0.85) / Math.max(inp.avgLOS, 0.1);
          const capUtil = inp.discharges / capMax;

          return {
            parts: { telecare, clawback, rcm, selfpayConv, c_selfpay, c_los, c_hrr, c_agency, couplingGain, throughput, b3_tm, b3_ma, b3_medicaid, b3_commercial, cmsSavingsPool, synergyBase, w, m1, m2, m3, teleTM, teleMA, teleMedicaid, teleCommercial },
            b1, b2, b3, b3_tm, b3_ma, gross, opex, capex, net, payback,
            onCount, moduleScale, careKappa, couplingScale, occGate, capUtil, rmultEff, apcmActive, netPMPM, enrolled, teleGrossAll, selBias, mix, losEligible,
            formulaErrors,
            apcmFloor: apcmActive && REGIME[regime].mult < 0.5 && lv.value,
            pepperCapped: inp.pepper > 80 && lv.rcm,
          };
        }

        function App() {
          const [scen, setScen] = useState("base");
          const [regime, setRegime] = useState("aco");
          const [cur, setCur] = useState("USD");
          const [fx] = useState(1350);
          const [lambda, setLambda] = useState(SCEN.base.lambda);
          const [selBias, setSelBias] = useState(0.90);
          const [showInputs, setShowInputs] = useState(false);
          const [showStack, setShowStack] = useState(false);
          const [showFormulas, setShowFormulas] = useState(false);
          const [formulas, setFormulas] = useState(FORMULA_DEFAULTS);
          const [inp, setInp] = useState(DEFAULT_INPUTS);
          const [lv, setLv] = useState({
            telecare: true, rcm: true, selfpayConv: true,
            selfpayCost: true, los: true, hrr: true, agency: true, value: true,
          });

          const pickScen = (s) => { setScen(s); setLambda(SCEN[s].lambda); };
          const R = useMemo(() => compute(SCEN[scen], lv, inp, regime, lambda, selBias, formulas), [scen, lv, inp, regime, lambda, selBias, formulas]);
          const band = useMemo(() => {
            const lo = compute(SCEN.cons, lv, inp, regime, SCEN.cons.lambda, selBias, formulas).net;
            const hi = compute(SCEN.aggr, lv, inp, regime, SCEN.aggr.lambda, selBias, formulas).net;
            return { lo: Math.min(lo, hi), hi: Math.max(lo, hi) };
          }, [lv, inp, regime, selBias, formulas]);
          const viewport = useViewport();
          const S = useMemo(() => createStyles(viewport), [viewport]);

          const fmt = (usd) => {
            if (cur === "KRW") { const e = (usd * fx) / 1e8; return `${Math.abs(e) >= 100 ? e.toFixed(0) : e.toFixed(1)}억`; }
            const m = usd / 1e6;
            if (Math.abs(m) >= 1) return `$${m.toFixed(2)}M`;
            return `$${Math.round(usd).toLocaleString()}`;
          };
          const sign = (v) => (v >= 0 ? "+" : "−");

          const items = [];
          if (lv.telecare) items.push({ label: "원격케어 (경로)", v: R.parts.telecare, c: LAYER_META.B1.color });
          if (lv.telecare && R.parts.clawback > 0) items.push({ label: "└ ACO 음결합", v: -R.parts.clawback, c: "#E06C75" });
          if (lv.rcm) items.push({ label: "RCM·CDI", v: R.parts.rcm, c: LAYER_META.B1.color });
          if (lv.selfpayConv) items.push({ label: "Self-Pay 전환", v: R.parts.selfpayConv, c: LAYER_META.B1.color });
          if (lv.selfpayCost) items.push({ label: "Self-Pay 원가회피", v: R.parts.c_selfpay, c: LAYER_META.B2.color });
          if (lv.los) items.push({ label: "LOS 변동비", v: R.parts.c_los, c: LAYER_META.B2.color });
          if (lv.los && R.parts.throughput > 0) items.push({ label: "└ throughput (occ)", v: R.parts.throughput, c: "#7EC8A0" });
          if (lv.hrr) items.push({ label: "HRR (TM)", v: R.parts.c_hrr, c: LAYER_META.B2.color });
          if (lv.agency) items.push({ label: "Agency Labor", v: R.parts.c_agency, c: LAYER_META.B2.color });
          if (R.couplingGain > 0) items.push({ label: "λ·κ 커플링", v: R.couplingGain, c: "#FF9F43" });
          if (lv.value && R.parts.b3_tm > 0) items.push({ label: "VBC shared (TM)", v: R.parts.b3_tm, c: LAYER_META.B3.color });
          if (lv.value && R.parts.b3_ma > 0) items.push({ label: "VBC HCC·품질 (MA)", v: R.parts.b3_ma, c: "#8E7CC3" });
          items.push({ label: "Loop 운용비", v: -R.opex, c: "#E06C75" });
          const maxAbs = Math.max(...items.map((i) => Math.abs(i.v)), 1);

          const bLo = Math.min(band.lo, 0), bHi = Math.max(band.hi, R.net, 0);
          const range = bHi - bLo || 1;
          const pct = (v) => `${((v - bLo) / range) * 100}%`;

          return (
            <div style={S.root}>
              <style>{`*{box-sizing:border-box;}
                input[type=number]{-moz-appearance:textfield;}
                input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
                .seg:hover{background:#1c2230;} .lv:active{transform:scale(.99);}
                input[type=range]{accent-color:#FF9F43;}
                button,input{font:inherit;}
                button{touch-action:manipulation;}`}</style>

              <div style={S.header}>
                <div>
                  <div style={S.kicker}>CAPTURE × COUPLING · v3.7.1</div>
                  <div style={S.title}>루프 적용 EBITDA 개선 추정모델</div>
                </div>
                <div style={S.curToggle}>
                  {["USD", "KRW"].map((c) => (
                    <button key={c} onClick={() => setCur(c)} style={{ ...S.curBtn, ...(cur === c ? S.curBtnOn : {}) }}>{c}</button>
                  ))}
                </div>
              </div>

              <div style={S.segRow}>
                {Object.keys(SCEN).map((s) => (
                  <button key={s} className="seg" onClick={() => pickScen(s)} style={{ ...S.seg, ...(scen === s ? S.segOn : {}) }}>{SCEN[s].label}</button>
                ))}
              </div>

              <div style={S.regimeLabel}>에피소드 책임구조 — TM value(θ) 게이팅</div>
